# Boleta Trader Workflow - Test Manifest (WhatsApp sample - anonymized with Presidio)
#
# Run with: python -m ferramentas.evaluation_suite.workflows.boleta_trader.run_experiment manifest_whats_amostra.yaml --export-csv

name: boleta_trader_whats_amostra
version: "1.0.0"
description: >
  Tests the boleta trader workflow on anonymized WhatsApp trading conversations.
  Uses the first quarter of WhatsApp data, anonymized with Presidio.

# Workflow configuration
workflow_path: ferramentas.evaluation_suite.workflows.boleta_trader.workflow_v2
workflow_function: get_workflow

# Data configuration - using the anonymized WhatsApp sample
data_file: ferramentas/evaluation_suite/workflows/boleta_trader/data/processed/whats_amostra_anonymized.csv
message_column: message
conversation_group_column: test_id
sender_column: sender

# Trigger keywords for detecting trade confirmations
trigger_keywords:
  - fecha
  - fechado
  - trava
  - fechamos
  - travo
  - fecho

# Evaluator configuration
evaluator_path: ferramentas.evaluation_suite.workflows.boleta_trader.evaluator
evaluator_function: summarize_for_manual_review

# LLM Configuration
llm_provider: ollama_cloud
temperature: 0.3

# Experiment metadata
tags:
  - boleta
  - trading
  - whatsapp
  - presidio-anonymized
  - sample

# Timeout configuration
timeout_seconds: 180
