# Boleta Trader Workflow v2 Experiment Manifest
#
# This manifest uses the modernized workflow that supports:
# - vizu_llm_service: Unified LLM access (Ollama local/cloud, OpenAI, Anthropic, Google)
# - Optional MCP integration: Connect to tool_pool_api for tools/resources
#
# Run with: make experiment-workflow-local
# Or with Ollama Cloud: LLM_PROVIDER=ollama_cloud make experiment-workflow-local

name: boleta_trader_extraction_v2
version: "2.0.0"
description: >
  Evaluates the boleta trader workflow v2 on WhatsApp trading conversations.
  This version uses vizu_llm_service for unified LLM access, supporting
  multiple providers (Ollama local, Ollama Cloud, OpenAI, Anthropic, Google).
  Tests the workflow's ability to detect trade triggers and extract
  quote (cotação) and volume values from anonymized conversation data.

# Workflow configuration - using v2 with vizu_llm_service
workflow_path: ferramentas.evaluation_suite.workflows.boleta_trader.workflow_v2
workflow_function: get_workflow

# Data configuration
data_file: ferramentas/evaluation_suite/workflows/boleta_trader/data/amostra_teste_anonimizada.csv
message_column: message
conversation_group_column: test_id
sender_column: nome_fantasia

# Trigger keywords for detecting trade confirmations
trigger_keywords:
  - fecha
  - fechado
  - trava
  - fechamos
  - travo
  - fecho

# Evaluator configuration
evaluator_path: ferramentas.evaluation_suite.workflows.boleta_trader.evaluator
evaluator_function: summarize_for_manual_review

# LLM Configuration
# The v2 workflow uses vizu_llm_service which reads from environment:
# - LLM_PROVIDER: ollama, ollama_cloud, openai, anthropic, google
# - OLLAMA_CLOUD_API_KEY: For Ollama Cloud
# - OPENAI_API_KEY: For OpenAI
# - etc.
#
# These are fallback values if env vars are not set:
llm_provider: ollama  # Default: use local Ollama
temperature: 0.3

# MCP Integration (optional)
# Set ENABLE_MCP_TOOLS=true to connect to tool_pool_api
# MCP_SERVER_URL defaults to http://tool_pool_api:9000/mcp/
enable_mcp_tools: false

# Experiment metadata
tags:
  - boleta
  - trading
  - whatsapp
  - extraction
  - v2
  - vizu_llm_service

# Timeout configuration
timeout_seconds: 180
