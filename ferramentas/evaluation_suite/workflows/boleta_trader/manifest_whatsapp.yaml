# Boleta Trader Workflow - Test Manifest (WhatsApp data)
#
# Run with: make experiment-workflow-v2

name: boleta_trader_whatsapp_test
version: "1.0.0"
description: >
  Tests the boleta trader workflow on WhatsApp trading conversations.
  Uses the processed anonymized WhatsApp export.

# Workflow configuration
workflow_path: ferramentas.evaluation_suite.workflows.boleta_trader.workflow_v2
workflow_function: get_workflow

# Data configuration - using the WhatsApp export
data_file: ferramentas/evaluation_suite/workflows/boleta_trader/data/processed/whatsapp_test.csv
message_column: message
conversation_group_column: test_id
sender_column: sender

# Trigger keywords for detecting trade confirmations
trigger_keywords:
  - fecha
  - fechado
  - trava
  - fechamos
  - travo
  - fecho

# Evaluator configuration
evaluator_path: ferramentas.evaluation_suite.workflows.boleta_trader.evaluator
evaluator_function: summarize_for_manual_review

# LLM Configuration
llm_provider: ollama
temperature: 0.3

# Experiment metadata
tags:
  - boleta
  - trading
  - whatsapp
  - test

# Timeout configuration
timeout_seconds: 180
