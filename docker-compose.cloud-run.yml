# ===============================================
# VIZU Cloud Run Docker Compose
# For Google Cloud Run deployment testing
# ===============================================
# Usage:
#   docker compose -f docker-compose.cloud-run.yml up --build
#
# Purpose:
#   - Test Cloud Run behavior locally (PORT env var, single container)
#   - Build images ready for Artifact Registry push
#   - No local infrastructure (uses cloud Supabase)
#
# Deploy to Cloud Run:
#   gcloud run deploy <service> \
#     --image=<region>-docker.pkg.dev/<project>/vizu-mono/<service>:latest \
#     --platform=managed \
#     --region=<region> \
#     --allow-unauthenticated
# ===============================================

x-common-env: &common-env
  # Database (Supabase Cloud)
  DATABASE_URL_PROD: ${DATABASE_URL_PROD}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
  SUPABASE_JWT_JWK: ${SUPABASE_JWT_JWK}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-ES256}
  DB_MODE: supabase

  # Qdrant Cloud — DEPRECATED: migrated to Supabase vector_db schema
  # QDRANT_URL: ${QDRANT_URL}
  # QDRANT_API_KEY: ${QDRANT_API_KEY}

  # Embedding service (Cloud Run URL or local)
  EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-http://embedding_service:11435}

  # OpenTelemetry (Grafana Cloud or Langfuse)
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-vizu-cloudrun}

x-llm-env: &llm-env
  # LLM Provider config
  LLM_PROVIDER: ${LLM_PROVIDER:-google}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  # Redis (for caching)
  REDIS_URL: ${REDIS_URL}

  # Langfuse Observability
  LANGFUSE_HOST: ${LANGFUSE_HOST:-https://us.cloud.langfuse.com}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}

x-build-args: &build-args
  platform: linux/amd64

services:
  # =========================================
  # CORE SERVICES
  # =========================================

  atendente_core:
    container_name: cloudrun_atendente_core
    <<: *build-args
    build:
      context: .
      dockerfile: ./services/atendente_core/Dockerfile
    image: ${GCP_REGION:-southamerica-east1}-docker.pkg.dev/${GCP_PROJECT:-vizudev}/vizu-mono/atendente-core:${IMAGE_TAG:-latest}
    env_file:
      - .env.cloudrun
    environment:
      <<: [*common-env, *llm-env]
      PORT: "8000"
      PYTHONPATH: /app/src
      USE_LOCAL_DB: "false"
      # Inter-service URLs (Cloud Run URLs in production)
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://tool_pool_api:8000/mcp/}
      BASE_URL: ${BASE_URL:-http://atendente_core:8000}
    ports:
      - "8003:8000"

  tool_pool_api:
    container_name: cloudrun_tool_pool_api
    <<: *build-args
    build:
      context: .
      dockerfile: ./services/tool_pool_api/Dockerfile
    image: ${GCP_REGION:-southamerica-east1}-docker.pkg.dev/${GCP_PROJECT:-vizudev}/vizu-mono/tool-pool-api:${IMAGE_TAG:-latest}
    env_file:
      - .env.cloudrun
    environment:
      <<: [*common-env, *llm-env]
      PORT: "8000"
      PYTHONPATH: /app/src
      MCP_AUTH_GOOGLE_CLIENT_ID: ${MCP_AUTH_GOOGLE_CLIENT_ID:-}
      MCP_AUTH_GOOGLE_CLIENT_SECRET_DEV: ${MCP_AUTH_GOOGLE_CLIENT_SECRET_DEV:-}
      MCP_AUTH_BASE_URL: ${MCP_AUTH_BASE_URL:-}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-}
      DOCKER_MCP_ENABLED: "false"
    ports:
      - "8006:8000"

  # NOTE: analytics_api and data_ingestion_api REMOVED (deprecated)
  # All functionality now handled via Supabase PostgREST + RPCs

  # =========================================
  # AGENT SERVICES
  # =========================================

  vendas_agent:
    container_name: cloudrun_vendas_agent
    <<: *build-args
    build:
      context: .
      dockerfile: ./services/vendas_agent/Dockerfile
    image: ${GCP_REGION:-southamerica-east1}-docker.pkg.dev/${GCP_PROJECT:-vizudev}/vizu-mono/vendas-agent:${IMAGE_TAG:-latest}
    env_file:
      - .env.cloudrun
    environment:
      <<: [*common-env, *llm-env]
      PORT: "8000"
      PYTHONPATH: /app/src
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://tool_pool_api:8000/mcp/}
      USE_LOCAL_DB: "false"
    ports:
      - "8009:8000"

  support_agent:
    container_name: cloudrun_support_agent
    <<: *build-args
    build:
      context: .
      dockerfile: ./services/support_agent/Dockerfile
    image: ${GCP_REGION:-southamerica-east1}-docker.pkg.dev/${GCP_PROJECT:-vizudev}/vizu-mono/support-agent:${IMAGE_TAG:-latest}
    env_file:
      - .env.cloudrun
    environment:
      <<: [*common-env, *llm-env]
      PORT: "8000"
      PYTHONPATH: /app/src
      MCP_SERVER_URL: ${MCP_SERVER_URL:-http://tool_pool_api:8000/mcp/}
      USE_LOCAL_DB: "false"
    ports:
      - "8010:8000"

  # =========================================
  # FRONTEND (Dashboard)
  # =========================================

  vizu_dashboard:
    container_name: cloudrun_vizu_dashboard
    <<: *build-args
    build:
      context: .
      dockerfile: ./apps/vizu_dashboard/Dockerfile
      args:
        VITE_SUPABASE_URL: ${SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8003}
        VITE_ATENDENTE_CORE: ${VITE_ATENDENTE_CORE:-http://localhost:8003}
    image: ${GCP_REGION:-southamerica-east1}-docker.pkg.dev/${GCP_PROJECT:-vizudev}/vizu-mono/vizu-dashboard:${IMAGE_TAG:-latest}
    environment:
      PORT: "80"
    ports:
      - "8080:80"

networks:
  default:
    name: vizu_cloudrun_network
