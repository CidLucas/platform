# ===============================================
# VIZU Cloud Run Docker Compose (Local Testing)
# ===============================================
# This compose file mirrors the 3-service architecture
# deployed to Google Cloud Run:
#   1. agents-pool (atendente_core, tool_pool_api, vendas_agent, support_agent)
#   2. workers-pool (data_ingestion_worker, file_processing_worker, file_upload_api)
#   3. embedding-service
#
# Usage:
#   docker compose -f docker-compose.cloud-run.yml up --build
#
# Note: Uses local build, not GHCR images.
#       For production, images are pushed to GCP Artifact Registry.
# ===============================================

x-common-env: &common-env
  # Database (Supabase)
  DATABASE_URL: ${DATABASE_URL}
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_KEY: ${SUPABASE_KEY}
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
  DB_MODE: supabase

  # Qdrant Cloud
  QDRANT_URL: ${QDRANT_URL}
  QDRANT_API_KEY: ${QDRANT_API_KEY}

  # Embedding service (internal)
  EMBEDDING_SERVICE_URL: http://embedding-service:11435

  # Grafana Cloud OTLP (direct export)
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS}
  OTEL_SERVICE_NAME: vizu-cloud-run

x-atendente-env: &atendente-env
  # LLM Provider config
  LLM_PROVIDER: ${LLM_PROVIDER:-google}

  # Google AI
  GOOGLE_API_KEY: ${GOOGLE_API_KEY}

  # OpenAI (backup)
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  # Anthropic (backup)
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

  # Langfuse Observability
  LANGFUSE_HOST: ${LANGFUSE_HOST:-https://us.cloud.langfuse.com}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}

x-restart-policy: &restart-policy
  restart: unless-stopped

x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 40s

x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # =========================================
  # GROUP 1: agents-pool
  # Purpose: LLM agents + tool orchestration (main entry point)
  # Components:
  #   - atendente_core: Main LLM agent (public)
  #   - tool_pool_api: Tool orchestration (internal)
  #   - vendas_agent: Sales agent (internal)
  #   - support_agent: Support agent (internal)
  # Resources: 2GB, 10 concurrent requests, 3600s timeout
  # =========================================
  atendente-core:
    container_name: vizu_atendente_core
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/atendente_core/Dockerfile
    env_file:
      - .env.production
    environment:
      <<: [*common-env, *atendente-env]
      PYTHONPATH: /app/services/atendente_core/src
      USE_LOCAL_DB: "false"
    ports:
      - "8003:8000"
    <<: [*restart-policy, *logging]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    depends_on:
      tool-pool-api:
        condition: service_healthy
      embedding-service:
        condition: service_healthy

  tool-pool-api:
    container_name: vizu_tool_pool_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/tool_pool_api/Dockerfile
      args:
        PYTHONPATH: "/app/services/tool_pool_api/src"
    env_file:
      - .env.production
    environment:
      <<: [*common-env, *atendente-env]
      PYTHONPATH: /app/services/tool_pool_api/src
      USE_LOCAL_DB: "false"
    ports:
      - "8004:9000"
    <<: [*restart-policy, *logging]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]

  vendas-agent:
    container_name: vizu_vendas_agent
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/vendas_agent/Dockerfile
      args:
        PYTHONPATH: "/app/src"
    env_file:
      - .env.production
    environment:
      <<: [*common-env, *atendente-env]
      PYTHONPATH: /app/src
      USE_LOCAL_DB: "false"
    ports:
      - "8005:8000"
    <<: [*restart-policy, *logging]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

  support-agent:
    container_name: vizu_support_agent
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/support_agent/Dockerfile
      args:
        PYTHONPATH: "/app/src"
    env_file:
      - .env.production
    environment:
      <<: [*common-env, *atendente-env]
      PYTHONPATH: /app/src
      USE_LOCAL_DB: "false"
    ports:
      - "8006:8000"
    <<: [*restart-policy, *logging]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]

  # =========================================
  # GROUP 2: workers-pool
  # Purpose: Async data processing & file handling
  # Components:
  #   - data_ingestion_worker: Data ingestion from external sources (internal)
  #   - file_processing_worker: File processing & RAG pipeline (internal)
  #   - file_upload_api: File upload endpoint (public)
  # Resources: 1-2GB, scales 0-100
  # =========================================
  data-ingestion-worker:
    container_name: vizu_data_ingestion_worker
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/data_ingestion_worker/Dockerfile
      args:
        PYTHONPATH: "/app/src:/app/libs"
    env_file:
      - .env.production
    environment:
      <<: [*common-env]
      PYTHONPATH: /app/src:/app/libs
      USE_LOCAL_DB: "false"
    ports:
      - "8007:8000"
    <<: [*restart-policy, *logging]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    depends_on:
      embedding-service:
        condition: service_healthy

  file-processing-worker:
    container_name: vizu_file_processing_worker
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/file_processing_worker/Dockerfile
      args:
        PYTHONPATH: "/app/src"
    env_file:
      - .env.production
    environment:
      <<: [*common-env]
      PYTHONPATH: /app/src
      USE_LOCAL_DB: "false"
    ports:
      - "8008:8000"
    <<: [*restart-policy, *logging]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    depends_on:
      embedding-service:
        condition: service_healthy

  file-upload-api:
    container_name: vizu_file_upload_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/file_upload_api/Dockerfile
      args:
        PYTHONPATH: "/app/src"
    env_file:
      - .env.production
    environment:
      <<: [*common-env]
      PYTHONPATH: /app/src
      USE_LOCAL_DB: "false"
    ports:
      - "8009:8000"
    <<: [*restart-policy, *logging]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
    depends_on:
      embedding-service:
        condition: service_healthy

  # =========================================
  # GROUP 3: embedding-service
  # Purpose: Shared embedding inference service
  # Resources: 2GB, 50 concurrent requests
  # Port: 11435 (internal)
  # =========================================
  embedding-service:
    container_name: vizu_embedding_service
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/embedding_service/Dockerfile
      args:
        PYTHONPATH: "/app/src"
    env_file:
      - .env.production
    environment:
      <<: [*common-env]
      PYTHONPATH: /app/src
      USE_LOCAL_DB: "false"
    ports:
      - "11435:11435"
    <<: [*restart-policy, *logging]
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-f", "http://localhost:11435/health"]

networks:
  default:
    name: vizu-cloud-run
    driver: bridge
