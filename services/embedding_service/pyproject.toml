[tool.poetry]
name = "embedding-service"
version = "0.1.0"
description = "Microserviço da Vizu para servir modelos de embedding HuggingFace"
authors = ["Vizu"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.29.0"}
pydantic-settings = "^2.2.1"
langchain-huggingface = "^0.0.3"
sentence-transformers = "^3.0.1" # Dependência necessária para o HuggingFaceEmbeddings

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"