[tool.poetry]
name = "tools"
version = "0.1.0"
description = "Small utilities service for Vizu (monitoring, helpers)"
authors = ["Vizu <dev@vizu.local>"]
license = "MIT"

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.98.0"
uvicorn = {extras = ["standard"], version = "^0.22.0"}
aiohttp = "^3.9.0"
# crawl4ai is optional; keep as extra to avoid hard dependency for tests
crawl4ai = "^0.7.0"

[tool.poetry.dev-dependencies]
pytest = "^7.0.0"
pytest-asyncio = "^0.21.0"

[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"
