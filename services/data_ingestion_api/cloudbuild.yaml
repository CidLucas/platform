# cloudbuild.yaml - Cloud Build configuration for data_ingestion_api
# Run from monorepo root: gcloud builds submit --config=cloudbuild.yaml --project=vizudev

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_IMAGE}'
      - '-f'
      - 'services/data_ingestion_api/Dockerfile'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_IMAGE}'

images:
  - '${_IMAGE}'

substitutions:
  _IMAGE: 'us-east1-docker.pkg.dev/${PROJECT_ID}/vizu/data-ingestion-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
