# services/data_ingestion_api/pyproject.toml

[tool.poetry]
name = "data-ingestion-api"
version = "0.1.0"
description = "Microsserviço de Conectores Enterprise para Ingestão de Dados da Vizu (DAS)."
authors = ["Vizu Engineering Team"]
license = "Proprietary"
packages = [{include = "src"}] # Garante que o Python veja a pasta como pacote

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.30.1"}
pydantic = "^2.7.4"
# Dependências de Conectividade Cloud/DB
psycopg2-binary = "^2.9.9"
google-cloud-bigquery = "^3.21.0" # Para o Conector BigQuery (Enterprise)
google-auth = "^2.29.0"     # Para autenticação GCP
pandas = "^2.2.0" 
db-dtypes = "^1.2.0"

# --- DEPENDÊNCIAS INTERNAS DO MONOREPO (LINKS PARA LIBS/) ---
# O Poetry resolve o caminho relativo para instalar em modo editável
vizu-db-connector = {path = "../../libs/vizu_db_connector", develop = true}
vizu-shared-models = {path = "../../libs/vizu_shared_models", develop = true}

[tool.poetry.group.dev.dependencies]
# Essenciais para Testabilidade
pytest = "^8.2.2"
pytest-asyncio = "^0.23.6"
pytest-mock = "^3.14.0" # CRÍTICO para mockar o Secret Manager
httpx = "^0.27.0"
black = "^24.4.2"
isort = "^5.12.0"

[tool.pytest.ini_options]
# O ponto ('.') adiciona a raiz (data_ingestion_api/). 
# Adicionamos 'src' e 'connectors' para resolver qualquer importação direta.
pythonpath = [".", "src", "connectors", "services"] 
testpaths = ["tests"]

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"