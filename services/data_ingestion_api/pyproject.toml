[tool.poetry]
name = "data_ingestion_api-api"
version = "0.1.0"
description = "API síncrona para ingestao na Vizu."
authors = ["Lucas Cid <lucas@vizubr.com>"]
readme = "README.md"
packages = [{include = "data_ingestion_api", from = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.30.1"}
pydantic = "^2.7.4"
pydantic-settings = "^2.2.1"
supabase = "^2.4.0"  # Cliente Python para Supabase
psycopg2-binary = "^2.9.9"
google-auth = "^2.28.0"  # Lightweight auth for BigQuery REST
requests = "^2.32.3"      # HTTP client for BigQuery REST

# --- DEPENDÊNCIAS INTERNAS DO MONOREPO (LINKS PARA LIBS/) ---
vizu_auth = {path = "../../libs/vizu_auth", develop = true}
vizu_supabase_client = {path = "../../libs/vizu_supabase_client", develop = true}
# REMOVED: vizu_data_connectors - using Supabase FDW instead of BigQuery SDK
# Note: google-auth + requests used only for lightweight schema discovery

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.2"
pytest-asyncio = "^0.23.6"
pytest-mock = "^3.14.0"
httpx = "^0.27.0"
black = "^24.4.2"
isort = "^5.12.0"

[tool.pytest.ini_options]
pythonpath = [ "src", "services"]
testpaths = ["tests"]
asyncio_mode = "auto"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


