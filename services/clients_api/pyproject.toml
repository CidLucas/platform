[tool.poetry]
name = "clients-api"
version = "0.1.0"
description = "API para gerenciar Clientes Vizu e suas credenciais de serviços externos."
authors = ["Vizu DevOps <devops@vizu.ai>"]
readme = "README.md"
packages = [{include = "clients_api", from = "src"}]

[tool.poetry.dependencies]
python = "~3.11"
fastapi = "^0.111.0"
uvicorn = {extras = ["standard"], version = "^0.24.0"}
pydantic-settings = "^2.1.0"
cryptography = "^41.0.6"
vizu_models = { path = "../../libs/vizu_models", develop = true }
vizu-db-connector = { path = "../../libs/vizu_db_connector", develop = true }
vizu-observability-bootstrap = { path = "../../libs/vizu_observability_bootstrap", develop = true }


[tool.poetry.group.dev.dependencies]
pytest = "^8.2.0"
ruff = "^0.4.4"
httpx = "^0.27.0"  # <-- ADICIONE: Cliente HTTP para testes de API
sqlalchemy-utils = "^0.41.1"



[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
pythonpath = [
    "src",
    "../../libs"
]