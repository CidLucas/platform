[tool.poetry]
name = "standalone_agent_api"
version = "0.1.0"
description = "Standalone Agent API - Runtime service for user-initialized standalone agents"
authors = ["Lucas Cid <lucas@vizubr.com>"]
readme = "README.md"
packages = [{ include = "standalone_agent_api", from = "src" }]

[tool.poetry.dependencies]
python = ">=3.11,<3.14"

# --- Core MCP/FastAPI ---
fastapi = "^0.115.13"
uvicorn = { extras = ["standard"], version = "^0.34.3" }
pydantic-settings = "^2.3.4"
anyio = "^4.1.1"
redis = "^5.0.0"
httpx = "^0.28.1"
langfuse = "^3.0.0"
langchain = "^0.3.0"
langgraph-checkpoint-redis = "^0.1.3"

# --- Internal libs ---
vizu-models = { path = "../../libs/vizu_models", develop = true }
vizu-agent-framework = { path = "../../libs/vizu_agent_framework", develop = true }
vizu-prompt-management = { path = "../../libs/vizu_prompt_management", develop = true }
vizu-llm-service = { path = "../../libs/vizu_llm_service", develop = true, extras = ["openai"] }
vizu-tool-registry = { path = "../../libs/vizu_tool_registry", develop = true }
vizu-rag-factory = { path = "../../libs/vizu_rag_factory", develop = true }
vizu-auth = { path = "../../libs/vizu_auth", develop = true }
vizu-context-service = { path = "../../libs/vizu_context_service", develop = true }
vizu-db-connector = { path = "../../libs/vizu_db_connector", develop = true }
vizu-supabase-client = { path = "../../libs/vizu_supabase_client", develop = true }
vizu-parsers = { path = "../../libs/vizu_parsers", develop = true }
vizu-observability-bootstrap = { path = "../../libs/vizu_observability_bootstrap" }

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.2"
pytest-asyncio = "^0.23.0"
pytest-mock = "^3.14.0"
ruff = "^0.5.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["src"]
