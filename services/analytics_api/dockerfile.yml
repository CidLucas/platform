# Estágio 1: Builder - Instala dependências com Poetry
# Usamos uma imagem "builder" para instalar o poetry e as dependências.
# Isso não estará na imagem final.
FROM python:3.11-slim as builder

# Instala o Poetry
RUN pip install poetry
ENV POETRY_NO_INTERACTION=1
ENV POETRY_VIRTUALENVS_IN_PROJECT=true # Cria .venv dentro do diretório do projeto
WORKDIR /app

# 1. COPIE as 'libs' primeiro.
# O Poetry precisa delas para encontrar as dependências de path local.
COPY ./libs ./libs

# 2. COPIE os arquivos de projeto para sua estrutura de pastas espelhada.
# Copiamos SÓ os arquivos de definição de dependência.
COPY ./services/analytics_api/pyproject.toml ./services/analytics_api/poetry.lock* ./services/analytics_api/

# 3. MUDE o WORKDIR para o diretório do serviço.
WORKDIR /app/services/analytics_api

# 4. INSTALE as dependências.
# Usamos --no-root porque não queremos instalar a 'analytics_api' ainda,
# apenas suas dependências listadas no pyproject.toml.
RUN poetry install --no-root

# -----------------------------------------------------

# Estágio 2: Final - Cria a imagem de produção limpa
# Esta é a imagem que será usada em produção.
FROM python:3.11-slim

# Define o diretório de trabalho final
WORKDIR /app

# 5. COPIE o .venv do local exato onde foi criado no builder.
# Copia o ambiente virtual com todas as dependências (uvicorn, fastapi, etc.)
COPY --from=builder /app/services/analytics_api/.venv ./.venv

# 6. COPIE o código fonte da aplicação e das libs necessárias.
# Copia o código fonte da API para /app/src
COPY ./services/analytics_api/src ./src

# Copia o código fonte das libs que a API usa em tempo de execução
COPY ./libs/vizu-db-connector/src ./libs/vizu_db_connector/src
COPY ./libs/vizu-shared-models/src ./libs/vizu_shared_models/src

# 7. AJUSTE o PATH para incluir os binários do venv (como o uvicorn)
ENV PATH="/app/.venv/bin:$PATH"

# 8. AJUSTE o PYTHONPATH para que o Python encontre os módulos
# Este é um passo CRÍTICO no nosso monorepo.
# Ele diz ao Python para procurar em /app/src (analytics_api) e nas libs.
ENV PYTHONPATH="/app/src:/app/libs/vizu_db_connector/src:/app/libs/vizu_shared_models/src"

# 9. DEFINA o comando de execução.
# Expõe a porta 80 (padrão para Cloud Run e outros)
EXPOSE 80
# Inicia o servidor uvicorn, apontando para 'app' dentro de 'analytics_api.main'
CMD ["uvicorn", "analytics_api.main:app", "--host", "0.0.0.0", "--port", "80"]