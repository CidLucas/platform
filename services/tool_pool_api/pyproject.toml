[tool.poetry]
name = "tool_pool_api"
version = "0.1.0"
description = "Serviço MCP da Vizu que atua como um pool de ferramentas agnóstico ao cliente."
authors = ["Lucas Cid <lucas@vizubr.com>"]
readme = "README.md"
packages = [{ include = "tool_pool_api", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"

# --- Core MCP/FastAPI ---
fastapi = "^0.115.13"
uvicorn = { extras = ["standard"], version = "^0.34.3" }
pydantic-settings = "^2.3.4"
fastmcp = "^2.11.0"
anyio = "^4.1.1"
redis = "^5.0.0"
httpx = "^0.28.1"
langfuse = "^3.0.0"
langchain = "^0.3.0"  # Required for langfuse.langchain integration
duckdb = "^1.1.0"  # In-process analytical SQL engine for CSV queries

# --- Internal libs (only direct dependencies) ---
vizu-models = { path = "../../libs/vizu_models", develop = true }
vizu-db-connector = { path = "../../libs/vizu_db_connector", develop = true }
vizu-context-service = { path = "../../libs/vizu_context_service", develop = true }
vizu-auth = { path = "../../libs/vizu_auth", develop = true }
vizu-observability-bootstrap = { path = "../../libs/vizu_observability_bootstrap" }
vizu-llm-service = { path = "../../libs/vizu_llm_service", develop = true }
vizu-rag-factory = { path = "../../libs/vizu_rag_factory", develop = true }
vizu-sql-factory = { path = "../../libs/vizu_sql_factory", develop = true }
vizu-tool-registry = { path = "../../libs/vizu_tool_registry", develop = true }
vizu-prompt-management = { path = "../../libs/vizu_prompt_management", develop = true }
vizu-google-suite-client = { path = "../../libs/vizu_google_suite_client", develop = true }
vizu-parsers = { path = "../../libs/vizu_parsers", develop = true }

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.2"
pytest-asyncio = "^0.23.0"
pytest-mock = "^3.14.0"
ruff = "^0.5.0"
pytest-cov = "^7.0.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["src"]