[tool.poetry]
name = "tool_pool_api"
version = "0.1.0"
description = "Serviço MCP da Vizu que atua como um pool de ferramentas agnóstico ao cliente."
authors = ["Lucas Cid <lucas@vizubr.com>"]
readme = "README.md"
packages = [{ include = "tool_pool_api", from = "src" }]

[tool.poetry.dependencies]
python = "^3.11"

# --- Core MCP/FastAPI ---
# Adicionamos a dependência principal do MCP
fastapi = "^0.111.0"
uvicorn = { extras = ["standard"], version = "^0.30.1" }
pydantic-settings = "^2.3.4"
sentry-sdk = { extras = ["fastapi"], version = "^2.0.4" }
langchain-mcp-adapters = "^0.1.0" # Pacote cliente correto

# --- Nossas Libs Internas (Fase 1) ---
# Aqui está a chave da nossa Modularização.
# Apontamos para as bibliotecas que a Fase 1 produziu.
vizu_context_service = { path = "../../libs/vizu_context_service", develop = true }
vizu_rag_factory = { path = "../../libs/vizu_rag_factory", develop = true }
vizu_sql_factory = { path = "../../libs/vizu_sql_factory", develop = true }
# vizu_generic_tools = { path = "../../libs/vizu_generic_tools", develop = true } # (Descomentar quando criarmos)

# --- Dependências das Libs (Necessárias para o serviço rodar) ---
# O serviço precisa ter acesso às dependências de *nível inferior* também.
vizu_db_connector = { path = "../../libs/vizu_db_connector", develop = true }
vizu_shared_models = { path = "../../libs/vizu_shared_models", develop = true }

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.2"
pytest-cov = "^5.0.0"
pytest-asyncio = "^0.23.7"
httpx = "^0.27.0"
black = "^24.4.2"
ruff = "^0.5.0"
faker = "^26.0.0"
freezegun = "^1.5.1"
pytest-mock = "^3.14.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

# --- Configuração de Teste ---
# Conforme o "Manual de Boas Práticas Vizu Deploy",
# garantimos que o Pytest encontre o código em 'src/'
# e também o código de todas as libs.
[tool.pytest.ini_options]
pythonpath = [
    "src",
    "../../libs"
]
asyncio_mode = "auto"

# --- Configuração do Ruff (Linter/Formatter) ---
[tool.ruff]
line-length = 88
select = ["E", "F", "W", "I", "UP", "C4", "B"]
ignore = ["E501"]