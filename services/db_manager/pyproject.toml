[tool.poetry]
# --- Seção 1: Metadados do Projeto ---
# Define a identidade do nosso serviço/ferramenta.
name = "db-manager"
version = "0.1.0"
description = "Ferramenta CLI centralizada para operações de banco de dados na Vizu."
authors = ["Lucas Cid <lucas@vizubr.com>"]
readme = "README.md"  # Boa prática: aponta para um futuro README.
# Padrão Vizu: Informa ao Poetry onde encontrar o código fonte.
packages = [{include = "db_manager", from = "src"}]

[tool.poetry.dependencies]
# --- Seção 2: Dependências de Produção ---
# Lista o que é estritamente necessário para o db-manager funcionar.
python = "^3.11"
ruff = "^0.4.4"
sqlalchemy-utils = "^0.41.1"
alembic = "^1.13.1"

# A ÚNICA dependência externa que ele precisa é o nosso conector,
# pois é de lá que vêm os modelos e a configuração do Alembic.
vizu-db-connector = { path = "../../libs/vizu_db_connector" }
vizu-shared-models = { path = "../../libs/vizu_shared_models" }


[tool.poetry.group.dev.dependencies]
# --- Seção 3: Dependências de Desenvolvimento ---
# Ferramentas para garantir a qualidade do nosso código.
# Elas não são incluídas na imagem Docker final.
pytest = "^8.2.0"  # Para futuros testes unitários.
ruff = "^0.4.4"    # Nosso linter e formatador padrão.
sqlalchemy-utils = "^0.41.1" # <-- Movido para cá
pytest-dotenv = "^0.5.2"

[build-system]
# --- Seção 4: Configuração de Ferramentas (Build) ---
# Seção padrão que diz a outras ferramentas como construir este projeto.
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


[tool.pytest.ini_options]
# --- Seção 4: Configuração de Ferramentas (Pytest) ---
# Configuração CRUCIAL para que os testes funcionem no monorepo.
# Ensina o Pytest a encontrar tanto o nosso código fonte (em 'src/')
# quanto o código das nossas bibliotecas compartilhadas (em '../../libs').
pythonpath = [
    "src",
    "../../libs"
]