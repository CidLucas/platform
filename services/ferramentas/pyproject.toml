[tool.poetry]
name = "ferramentas-vizu"
version = "0.1.0"
description = "Ferramentas CLI internas para auxiliar no desenvolvimento e operações da Vizu."
authors = ["Vizu Engineering <eng@vizu.ai>"]
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "~3.11"
beautifulsoup4 = "^4.12.3"
requests = "^2.32.3"
# --- ATUALIZANDO A VERSÃO DO CRAWL4AI ---
crawl4ai = "^0.7.0"
lxml = "^5.2.2"


[tool.poetry.group.dev.dependencies]
pytest = "^8.2.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"