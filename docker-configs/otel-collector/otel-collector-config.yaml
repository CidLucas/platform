# OpenTelemetry Collector Configuration for Development
#
# LLM observability is handled by the Langfuse SDK (LangChain callback),
# not via OTEL. This collector is for infrastructure traces/metrics/logs only.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
        max_recv_msg_size_mib: 16  # Increase from default 4MB
      http:
        endpoint: "0.0.0.0:4318"

processors:
  # Memory limiter to prevent OOM - drops data when memory is high
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128

  batch:
    timeout: 5s
    send_batch_size: 512
    send_batch_max_size: 1024

  resource:
    attributes:
      - key: deployment.environment
        value: development
        action: upsert
      - key: service.namespace
        value: vizu
        action: upsert

exporters:
  # Debug exporter for console output
  debug:
    verbosity: detailed
    sampling_initial: 10
    sampling_thereafter: 10

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"

service:
  telemetry:
    logs:
      level: info  # Reduce noise, change to debug if troubleshooting

  extensions: [health_check]

  pipelines:
    # Pipeline for debug - all traces (for local development visibility)
    traces/debug:
      receivers: [otlp]
      processors: [memory_limiter, resource, batch]
      exporters: [debug]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [debug]

    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
