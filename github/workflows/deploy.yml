# .github/workflows/deploy.yml
name: Vizu CI/CD - Deploy to Production

on:
  push:
    branches:
      - main # Dispara o workflow em cada push para a branch principal

jobs:
  # --- Job 1: Testes Rápidos (Lint e Unit) ---
  test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pip install poetry
      - name: Install Dependencies
        run: poetry install
      - name: Run Linter (Ruff)
        run: poetry run ruff check .
      - name: Run Unit Tests
        run: poetry run pytest --ignore=tests/integration # Ignora os testes de integração

  # --- Job 2: Construir e Publicar Imagens Docker ---
  build_and_push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: test # Só roda se os testes passarem
    permissions:
      contents: read
      id-token: write # Permissão para autenticar no GCP
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/YOUR_GCP_PROJECT_ID/locations/global/workloadIdentityPools/YOUR_POOL/providers/YOUR_PROVIDER"
          service_account: "your-ci-cd-service-account@your-project.iam.gserviceaccount.com"
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Configure Docker for GCP Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev
      - name: Build and Push db-manager
        run: |
          docker build -t us-central1-docker.pkg.dev/YOUR_GCP_PROJECT_ID/vizu-services/db-manager:${{ github.sha }} -f services/db_manager/Dockerfile .
          docker push us-central1-docker.pkg.dev/YOUR_GCP_PROJECT_ID/vizu-services/db-manager:${{ github.sha }}
      - name: Build and Push clientes_finais_api
        run: |
          docker build -t us-central1-docker.pkg.dev/YOUR_GCP_PROJECT_ID/vizu-services/clientes_finais_api:${{ github.sha }} -f services/clientes_finais_api/Dockerfile .
          docker push us-central1-docker.pkg.dev/YOUR_GCP_PROJECT_ID/vizu-services/clientes_finais_api:${{ github.sha }}

  # --- Job 3: Deploy em Produção ---
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build_and_push # Só roda se as imagens forem construídas
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/YOUR_GCP_PROJECT_ID/locations/global/workloadIdentityPools/YOUR_POOL/providers/YOUR_PROVIDER"
          service_account: "your-ci-cd-service-account@your-project.iam.gserviceaccount.com"

      # --- PASSO CRUCIAL: MIGRAÇÃO DO BANCO DE PRODUÇÃO ---
      - name: Run Database Migrations
        uses: google-github-actions/setup-gcloud@v2
      - run: |
          gcloud run jobs execute db-manager-job \
            --wait \
            --region us-central1 \
            --update-env-vars="DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}" \
            --args="migrate"

      # --- PASSO FINAL: DEPLOY DAS APIS ---
      - name: Deploy clientes_finais_api to Cloud Run
        run: |
          gcloud run deploy clientes-finais-api \
            --image=us-central1-docker.pkg.dev/YOUR_GCP_PROJECT_ID/vizu-services/clientes_finais_api:${{ github.sha }} \
            --region=us-central1 \
            --allow-unauthenticated \
            --set-env-vars="DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}"
