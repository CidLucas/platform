server {
  listen ${PORT};

  location / {
    root   /usr/share/nginx/html;
    index  index.html;
    try_files $uri $uri/ /index.html;

    # Security headers for map tiles and external resources
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    # CSP allows Supabase, Cloud Run APIs, and map tiles
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data: blob:; style-src 'self' 'unsafe-inline' https://unpkg.com https://cdnjs.cloudflare.com https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http://localhost:* https://*.supabase.co https://*.run.app https://stamen-tiles-a.a.ssl.fastly.net https://stamen-tiles-b.a.ssl.fastly.net https://stamen-tiles-c.a.ssl.fastly.net https://stamen-tiles-d.a.ssl.fastly.net; font-src 'self' https://unpkg.com https://fonts.gstatic.com;" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Cache static assets but not HTML (for SPA routing)
    add_header Cache-Control "no-cache" always;
  }

  # Cache JS/CSS assets longer
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
    root /usr/share/nginx/html;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
  }
}
