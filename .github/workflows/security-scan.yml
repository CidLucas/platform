name: Security Scan (Trivy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Sunday at midnight
    - cron: '0 0 * * 0'

env:
  # Fail on critical and high vulnerabilities
  TRIVY_SEVERITY: CRITICAL,HIGH
  # Services to scan (add more as needed)
  SERVICES: |
    atendente_core
    clients_api
    tool_pool_api
    analytics_api
    file_upload_api

jobs:
  # =========================================================================
  # Filesystem scan - check source code for secrets and misconfigurations
  # =========================================================================
  filesystem-scan:
    name: Scan Source Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          # Ignore test files and examples
          trivyignores: '.trivyignore'

      - name: Upload filesystem scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-fs-results.sarif'
          category: 'trivy-filesystem'

  # =========================================================================
  # Docker image vulnerability scan
  # =========================================================================
  image-scan:
    name: Scan Docker Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - atendente_core
          - clients_api
          - tool_pool_api
          - analytics_api
          - file_upload_api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image for scanning
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t vizu-${{ matrix.service }}:scan \
            .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vizu-${{ matrix.service }}:scan'
          format: 'sarif'
          output: 'trivy-${{ matrix.service }}.sarif'
          severity: 'CRITICAL,HIGH'
          # Exit with error on critical vulnerabilities
          exit-code: '1'
          # Ignore unfixed vulnerabilities (optional, remove for stricter policy)
          ignore-unfixed: true

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.service }}.sarif'
          category: 'trivy-${{ matrix.service }}'

      - name: Generate human-readable report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'vizu-${{ matrix.service }}:scan'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'

  # =========================================================================
  # Dependency scan (SBOMs and license check)
  # =========================================================================
  sbom-scan:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate SBOM for repository
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'sbom.json'

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

      - name: Check for vulnerable dependencies
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'sbom'
          scan-ref: 'sbom.json'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  # =========================================================================
  # Summary job
  # =========================================================================
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [filesystem-scan, image-scan, sbom-scan]
    if: always()
    steps:
      - name: Check scan results
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.filesystem-scan.result }}" == "success" ]; then
            echo "✅ Filesystem scan passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Filesystem scan failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.image-scan.result }}" == "success" ]; then
            echo "✅ Image scans passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Image scans failed - check individual service results" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.sbom-scan.result }}" == "success" ]; then
            echo "✅ SBOM/dependency scan passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ SBOM/dependency scan failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See the Security tab for detailed findings." >> $GITHUB_STEP_SUMMARY

      - name: Fail if any scan failed
        if: |
          needs.filesystem-scan.result == 'failure' ||
          needs.image-scan.result == 'failure' ||
          needs.sbom-scan.result == 'failure'
        run: |
          echo "One or more security scans failed. Please review the results."
          exit 1
