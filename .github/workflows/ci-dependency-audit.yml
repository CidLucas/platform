name: Dependency Audit

on:
  pull_request:
    paths:
      - 'libs/**'
      - 'services/**'
      - 'pyproject.toml'
      - '*/pyproject.toml'

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
      - name: Run heuristic dependency audit
        run: |
          python scripts/dependency_audit.py
      - name: Upload results
        if: failure()
        run: echo "Dependency audit failed. Check the logs above."
