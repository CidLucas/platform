name: Secret Scan

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    name: Detect Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets
        timeout-minutes: 3
        run: |
          mkdir -p artifacts
          detect-secrets scan \
            --exclude-files '\.git/.*' \
            --exclude-files '.*\.lock$' \
            --exclude-files 'langfuse/.*' \
            --exclude-files '.*\.example$' \
            --exclude-files 'node_modules/.*' \
            --exclude-files '.*\.min\.js$' \
            --exclude-files '.*\.map$' \
            --exclude-files 'apps/vizu_dashboard/node_modules/.*' \
            --exclude-files '\.venv/.*' \
            --exclude-files '__pycache__/.*' \
            --exclude-files '.*\.pyc$' \
            > artifacts/detect-secrets.json || true

          # Count findings
          FINDINGS=$(python3 -c "import json; d=json.load(open('artifacts/detect-secrets.json')); print(sum(len(v) for v in d.get('results', {}).values()))")
          echo "Found $FINDINGS potential secrets"

          if [ "$FINDINGS" -gt 0 ]; then
            echo "⚠️ Review artifacts/detect-secrets.json for details"
            python3 -c "
          import json
          d = json.load(open('artifacts/detect-secrets.json'))
          for f, issues in d.get('results', {}).items():
              for i in issues:
                  print(f\"  {f}:{i.get('line_number')} - {i.get('type')}\")
          " | head -20
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-scan-results
          path: artifacts/detect-secrets.json
