name: Secret Scan

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  detect-secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run detect-secrets scan
        id: detect
        run: |
          chmod +x scripts/detect_secrets_scan.sh
          ./scripts/detect_secrets_scan.sh

      - name: Check baseline and fail on new findings
        if: always()
        run: |
          # If a baseline .secrets.baseline exists in the repo, enforce it.
          if [ -f .secrets.baseline ]; then
            python - <<'PY'
import json,sys
f='artifacts/detect-secrets.json'
try:
    data=json.load(open(f))
except Exception as e:
    print('No results file found or parse error:', e)
    sys.exit(0)
secrets = data.get('results', {})
count = sum(len(v) for v in secrets.values())
if count>0:
    print('detect-secrets found findings not in baseline; failing CI (remove or update baseline after review)')
    sys.exit(2)
else:
    print('No new detect-secrets findings')
PY
          else
            echo "No .secrets.baseline found — not enforcing. Create a baseline after rotating secrets to enforce future PRs."
          fi

      - name: Upload detect-secrets results
        uses: actions/upload-artifact@v4
        with:
          name: detect-secrets-results
          path: artifacts/detect-secrets.json

      - name: Run scrub report
        run: |
          python3 scripts/find_secrets_for_scrub.py || true
