name: Secret Scan

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  detect-secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run detect-secrets scan
        id: detect
        run: |
          chmod +x scripts/detect_secrets_scan.sh
          ./scripts/detect_secrets_scan.sh

      - name: Check baseline and fail on new findings
        if: always()
        run: |
          # If a baseline .secrets.baseline exists in the repo, enforce it.
          if [ -f .secrets.baseline ]; then
            python3 - <<'PY'
import json
import sys

scan_file = 'artifacts/detect-secrets.json'
baseline_file = '.secrets.baseline'

try:
    scan_data = json.load(open(scan_file))
    baseline_data = json.load(open(baseline_file))
except Exception as e:
    print(f'Error loading files: {e}')
    sys.exit(0)

scan_secrets = scan_data.get('results', {})
baseline_secrets = baseline_data.get('results', {})

# Build set of (filename, line, type, hashed_secret) from baseline
baseline_set = set()
for filename, issues in baseline_secrets.items():
    for issue in issues:
        key = (filename, issue.get('line_number'), issue.get('type'), issue.get('hashed_secret'))
        baseline_set.add(key)

# Find new secrets not in baseline
new_findings = []
for filename, issues in scan_secrets.items():
    for issue in issues:
        key = (filename, issue.get('line_number'), issue.get('type'), issue.get('hashed_secret'))
        if key not in baseline_set:
            new_findings.append((filename, issue))

if new_findings:
    print(f'ERROR: {len(new_findings)} new secret(s) found not in baseline:')
    for filename, issue in new_findings[:10]:
        print(f'  {filename}:{issue.get("line_number")} - {issue.get("type")}')
    sys.exit(2)
else:
    scan_count = sum(len(v) for v in scan_secrets.values())
    baseline_count = sum(len(v) for v in baseline_secrets.values())
    print(f'No new secrets detected. Scan: {scan_count}, Baseline: {baseline_count}')
PY
          else
            echo "No .secrets.baseline found — not enforcing. Create a baseline after rotating secrets to enforce future PRs."
          fi

      - name: Upload detect-secrets results
        uses: actions/upload-artifact@v4
        with:
          name: detect-secrets-results
          path: artifacts/detect-secrets.json

      - name: Run scrub report
        run: |
          python3 scripts/find_secrets_for_scrub.py || true
