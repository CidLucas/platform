name: Validate .env.example

on:
  pull_request:
    paths:
      - '.env.example'
      - 'scripts/required_envs.json'
      - 'scripts/validate_env_example.py'
  push:
    branches: [ main ]

jobs:
  validate-env-example:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run .env.example validator
        run: |
          python3 scripts/validate_env_example.py
