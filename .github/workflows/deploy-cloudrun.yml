name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'libs/**'
      - '.github/workflows/deploy-cloudrun.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - atendente_core
          - clients_api
          - tool_pool_api
          - analytics_api
          - file_upload_api
          - clientes_finais_api
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION || 'southamerica-east1' }}
  GAR_LOCATION: ${{ vars.GAR_LOCATION || 'southamerica-east1' }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'vizu-images' }}

jobs:
  # =========================================================================
  # Determine which services to deploy
  # =========================================================================
  determine-services:
    name: Determine Services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.set-services.outputs.services }}
      environment: ${{ steps.set-env.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Set environment
        id: set-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Determine services to deploy
        id: set-services
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "${{ inputs.service }}" != "all" ]; then
            echo 'services=["${{ inputs.service }}"]' >> $GITHUB_OUTPUT
          else
            # Detect changed services
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E '^services/|^libs/' | cut -d'/' -f2 | sort -u)
            
            # Map libs changes to dependent services
            SERVICES="[]"
            for item in $CHANGED; do
              case $item in
                atendente_core|clients_api|tool_pool_api|analytics_api|file_upload_api|clientes_finais_api)
                  SERVICES=$(echo $SERVICES | jq -c ". + [\"$item\"] | unique")
                  ;;
                vizu_*)
                  # Lib changed - deploy all services that might depend on it
                  # In production, you'd have a dependency map here
                  SERVICES='["atendente_core","clients_api","tool_pool_api"]'
                  ;;
              esac
            done
            
            # Default to core services if nothing detected
            if [ "$SERVICES" == "[]" ]; then
              SERVICES='["atendente_core","clients_api","tool_pool_api"]'
            fi
            
            echo "services=$SERVICES" >> $GITHUB_OUTPUT
          fi

      - name: Log deployment plan
        run: |
          echo "## Deployment Plan" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ steps.set-env.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- Services: ${{ steps.set-services.outputs.services }}" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Run security scan before deployment
  # =========================================================================
  security-gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [determine-services]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run quick security scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  # =========================================================================
  # Build and push images
  # =========================================================================
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [determine-services, security-gate]
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

      - name: Scan built image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

  # =========================================================================
  # Deploy to Cloud Run
  # =========================================================================
  deploy:
    name: Deploy ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [determine-services, build]
    environment: ${{ needs.determine-services.outputs.environment }}
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.determine-services.outputs.services) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          ENV="${{ needs.determine-services.outputs.environment }}"
          SERVICE="${{ matrix.service }}"
          IMAGE="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${SERVICE}:${{ github.sha }}"
          
          # Build secrets injection string
          # Format: ENV_VAR=SECRET_NAME:latest
          SECRETS="DATABASE_URL=DATABASE_URL:latest"
          SECRETS="${SECRETS},SUPABASE_KEY=SUPABASE_KEY:latest"
          SECRETS="${SECRETS},SUPABASE_URL=SUPABASE_URL:latest"
          SECRETS="${SECRETS},SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest"
          SECRETS="${SECRETS},QDRANT_URL=QDRANT_URL:latest"
          SECRETS="${SECRETS},QDRANT_API_KEY=QDRANT_API_KEY:latest"
          SECRETS="${SECRETS},LANGFUSE_SECRET_KEY=LANGFUSE_SECRET_KEY:latest"
          SECRETS="${SECRETS},LANGFUSE_PUBLIC_KEY=LANGFUSE_PUBLIC_KEY:latest"
          SECRETS="${SECRETS},OTEL_EXPORTER_OTLP_HEADERS=GRAFANA_OTLP_HEADERS:latest"
          
          # Service-specific secrets
          case $SERVICE in
            atendente_core)
              SECRETS="${SECRETS},OPENAI_API_KEY=OPENAI_API_KEY:latest"
              SECRETS="${SECRETS},ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest"
              SECRETS="${SECRETS},GOOGLE_API_KEY=GOOGLE_API_KEY:latest"
              ;;
            tool_pool_api)
              SECRETS="${SECRETS},MCP_AUTH_GOOGLE_CLIENT_ID=MCP_AUTH_GOOGLE_CLIENT_ID:latest"
              SECRETS="${SECRETS},MCP_AUTH_GOOGLE_CLIENT_SECRET=MCP_AUTH_GOOGLE_CLIENT_SECRET:latest"
              ;;
          esac
          
          # Grafana Cloud OTLP endpoint (São Paulo)
          OTEL_ENDPOINT="https://otlp-gateway-prod-sa-east-1.grafana.net/otlp"
          
          # Deploy with rollback enabled
          gcloud run deploy ${SERVICE}-${ENV} \
            --image=${IMAGE} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-secrets="${SECRETS}" \
            --set-env-vars="OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_ENDPOINT},OTEL_SERVICE_NAME=${SERVICE},ENVIRONMENT=${ENV},COMMIT_SHA=${{ github.sha }}" \
            --memory=1Gi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --concurrency=80 \
            --port=8000 \
            --service-account=cloudrun-${SERVICE}@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          
          # Get service URL
          URL=$(gcloud run services describe ${SERVICE}-${ENV} --region=${{ env.GCP_REGION }} --format='value(status.url)')
          echo "service_url=${URL}" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          URL="${{ steps.deploy.outputs.service_url }}"
          echo "Checking health at ${URL}/health"
          
          for i in {1..10}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health" || echo "000")
            if [ "$STATUS" == "200" ]; then
              echo "✅ Health check passed"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS, retrying in 10s..."
            sleep 10
          done
          
          echo "❌ Health check failed after 10 attempts"
          exit 1

      - name: Log deployment result
        if: always()
        run: |
          echo "## ${{ matrix.service }} Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URL: ${{ steps.deploy.outputs.service_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Run migrations (only for main deployments)
  # =========================================================================
  migrations:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [determine-services, deploy]
    if: needs.determine-services.outputs.environment == 'production'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Run migrations via Cloud Run Job
        run: |
          # Execute migration as a Cloud Run Job
          gcloud run jobs execute db-migrations \
            --region=${{ env.GCP_REGION }} \
            --wait

  # =========================================================================
  # Post-deployment validation
  # =========================================================================
  validate:
    name: Validate Deployment
    runs-on: ubuntu-latest
    needs: [determine-services, deploy]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          pip install httpx pytest

      - name: Run smoke tests
        env:
          ENV: ${{ needs.determine-services.outputs.environment }}
          # These would be set based on deployed service URLs
          ATENDENTE_URL: ${{ secrets[format('{0}_ATENDENTE_URL', needs.determine-services.outputs.environment)] }}
          CLIENTS_URL: ${{ secrets[format('{0}_CLIENTS_URL', needs.determine-services.outputs.environment)] }}
        run: |
          echo "Running smoke tests against $ENV environment"
          # Add your smoke test script here
          # python ferramentas/e2e/smoke_test.py

      - name: Notify on success
        if: success()
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All services deployed and validated." >> $GITHUB_STEP_SUMMARY

  # =========================================================================
  # Rollback on failure
  # =========================================================================
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [determine-services, deploy, validate]
    if: failure() && needs.determine-services.outputs.environment == 'production'
    environment: production
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Rollback services
        run: |
          SERVICES='${{ needs.determine-services.outputs.services }}'
          ENV="${{ needs.determine-services.outputs.environment }}"
          
          for SERVICE in $(echo $SERVICES | jq -r '.[]'); do
            echo "Rolling back ${SERVICE}-${ENV}..."
            
            # Get previous revision
            PREV_REVISION=$(gcloud run revisions list \
              --service=${SERVICE}-${ENV} \
              --region=${{ env.GCP_REGION }} \
              --format='value(name)' \
              --limit=2 | tail -1)
            
            if [ -n "$PREV_REVISION" ]; then
              gcloud run services update-traffic ${SERVICE}-${ENV} \
                --region=${{ env.GCP_REGION }} \
                --to-revisions=${PREV_REVISION}=100
              echo "✅ Rolled back to ${PREV_REVISION}"
            else
              echo "⚠️ No previous revision found for ${SERVICE}"
            fi
          done

      - name: Alert on rollback
        run: |
          echo "## ⚠️ ROLLBACK EXECUTED" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Production deployment failed and was rolled back." >> $GITHUB_STEP_SUMMARY
          echo "Please investigate the failure before re-deploying." >> $GITHUB_STEP_SUMMARY
