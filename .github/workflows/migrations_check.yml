name: DB Migrations Check

on:
  pull_request:
    paths:
      - 'libs/vizu_models/**'
      - 'libs/vizu_db_connector/**'

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          cd libs/vizu_db_connector
          poetry install

      - name: Verify Migration Generation
        # Tenta gerar o SQL do Supabase como teste de sanidade
        # Se falhar aqui, o desenvolvedor sabe que quebrou algo antes de mergear
        run: |
          cd libs/vizu_db_connector
          export DATABASE_URL="postgresql://dummy:dummy@localhost:5432/dummy"
          poetry run vizu-db export-supabase --name "ci_check"