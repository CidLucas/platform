name: DB Migrations Check (CI)

on:
  pull_request:
    paths:
      - 'libs/vizu_db_connector/**'
      - 'libs/vizu_models/**'

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry

      - name: Install Dependencies
        run: |
          cd libs/vizu_db_connector
          poetry install

      - name: Verify Migration Generation
        env:
           # Define uma URL dummy apenas para o Alembic não reclamar na validação offline
           DATABASE_URL: postgresql://user:pass@localhost:5432/check_db
        run: |
          cd libs/vizu_db_connector
          # Tenta gerar o SQL do Supabase. Se falhar, o PR é bloqueado.
          poetry run vizu-db export-supabase --name "ci_validation_check"