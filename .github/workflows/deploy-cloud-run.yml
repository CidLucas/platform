name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'libs/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - agents-pool
          - workers-pool
          - embedding-service

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  GCP_SA_EMAIL: ${{ secrets.GCP_SA_EMAIL }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.services.outputs.list }}
      timestamp: ${{ steps.timestamp.outputs.value }}
    steps:
      - id: services
        run: |
          if [ "${{ github.event.inputs.service }}" == "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            echo 'list=["agents-pool", "workers-pool"]' >> $GITHUB_OUTPUT
          else
            echo 'list=["${{ github.event.inputs.service }}"]' >> $GITHUB_OUTPUT
          fi

      - id: timestamp
        run: echo "value=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

  build-and-deploy:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.setup.outputs.services) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Set image tag
        id: image
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=${{ needs.setup.outputs.timestamp }}
          IMAGE_TAG="${TIMESTAMP}-${COMMIT_SHA}"
          IMAGE_URI="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/${{ matrix.service }}:${IMAGE_TAG}"
          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

      # =================================================================
      # Build & Push for each service group
      # =================================================================

      - name: "Build: agents-pool (atendente_core + tool_pool_api + vendas_agent + support_agent)"
        if: contains(matrix.service, 'agents-pool')
        run: |
          # Build atendente_core (main entry point)
          docker build \
            --build-arg PYTHONPATH="/app/services/atendente_core/src" \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/atendente-core:${{ steps.image.outputs.tag }} \
            -f services/atendente_core/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/atendente-core:${{ steps.image.outputs.tag }}

          # Build tool_pool_api
          docker build \
            --build-arg PYTHONPATH="/app/services/tool_pool_api/src" \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/tool-pool-api:${{ steps.image.outputs.tag }} \
            -f services/tool_pool_api/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/tool-pool-api:${{ steps.image.outputs.tag }}

          # Build vendas_agent
          docker build \
            --build-arg PYTHONPATH="/app/src" \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/vendas-agent:${{ steps.image.outputs.tag }} \
            -f services/vendas_agent/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/vendas-agent:${{ steps.image.outputs.tag }}

          # Build support_agent
          docker build \
            --build-arg PYTHONPATH="/app/src" \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/support-agent:${{ steps.image.outputs.tag }} \
            -f services/support_agent/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/support-agent:${{ steps.image.outputs.tag }}

      - name: "Build: workers-pool"
        if: contains(matrix.service, 'workers-pool')
        run: |
          # Build data_ingestion_worker
          docker build \
            --build-arg PYTHONPATH="/app/src:/app/libs" \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/data-ingestion-worker:${{ steps.image.outputs.tag }} \
            -f services/data_ingestion_worker/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/data-ingestion-worker:${{ steps.image.outputs.tag }}

          # Build file_processing_worker
          docker build \
            --build-arg PYTHONPATH="/app/src" \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/file-processing-worker:${{ steps.image.outputs.tag }} \
            -f services/file_processing_worker/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/file-processing-worker:${{ steps.image.outputs.tag }}

          # Build file_upload_api
          docker build \
            --build-arg PYTHONPATH="/app/src" \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/file-upload-api:${{ steps.image.outputs.tag }} \
            -f services/file_upload_api/Dockerfile .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/file-upload-api:${{ steps.image.outputs.tag }}

      - name: "Build: embedding-service"
        if: contains(matrix.service, 'embedding-service')
        run: |
          docker build \
            --build-arg PYTHONPATH="/app/src" \
            -t ${{ steps.image.outputs.uri }} \
            -f services/embedding_service/Dockerfile .
          docker push ${{ steps.image.outputs.uri }}

      # =================================================================
      # Deploy to Cloud Run
      # =================================================================

      - name: "Deploy: atendente-core (main entry point)"
        if: contains(matrix.service, 'agents-pool')
        run: |
          gcloud run deploy atendente-core \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/atendente-core:${{ steps.image.outputs.tag }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 10 \
            --timeout 3600 \
            --max-instances 50 \
            --min-instances 1 \
            --ingress all \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" \
            --set-secrets "DATABASE_URL=database-url:latest,GOOGLE_API_KEY=google-api-key:latest,LANGFUSE_SECRET_KEY=langfuse-secret:latest,SUPABASE_KEY=supabase-key:latest" \
            --quiet

      - name: "Deploy: tool-pool-api"
        if: contains(matrix.service, 'agents-pool')
        run: |
          gcloud run deploy tool-pool-api \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/tool-pool-api:${{ steps.image.outputs.tag }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 5 \
            --timeout 3600 \
            --max-instances 20 \
            --min-instances 1 \
            --port 9000 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" \
            --set-secrets "DATABASE_URL=database-url:latest" \
            --quiet

      - name: "Deploy: vendas-agent"
        if: contains(matrix.service, 'agents-pool')
        run: |
          gcloud run deploy vendas-agent \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/vendas-agent:${{ steps.image.outputs.tag }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 10 \
            --timeout 3600 \
            --max-instances 20 \
            --min-instances 0 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" \
            --set-secrets "DATABASE_URL=database-url:latest,GOOGLE_API_KEY=google-api-key:latest" \
            --quiet

      - name: "Deploy: support-agent"
        if: contains(matrix.service, 'agents-pool')
        run: |
          gcloud run deploy support-agent \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/support-agent:${{ steps.image.outputs.tag }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 10 \
            --timeout 3600 \
            --max-instances 20 \
            --min-instances 0 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" \
            --set-secrets "DATABASE_URL=database-url:latest,GOOGLE_API_KEY=google-api-key:latest" \
            --quiet

      - name: "Deploy: data-ingestion-worker"
        if: contains(matrix.service, 'workers-pool')
        run: |
          gcloud run deploy data-ingestion-worker \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/data-ingestion-worker:${{ steps.image.outputs.tag }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 1Gi \
            --cpu 2 \
            --concurrency 50 \
            --timeout 600 \
            --max-instances 100 \
            --min-instances 0 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production" \
            --set-secrets "DATABASE_URL=database-url:latest" \
            --quiet

      - name: "Deploy: file-processing-worker"
        if: contains(matrix.service, 'workers-pool')
        run: |
          gcloud run deploy file-processing-worker \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/file-processing-worker:${{ steps.image.outputs.tag }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 20 \
            --timeout 1800 \
            --max-instances 50 \
            --min-instances 0 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production" \
            --set-secrets "DATABASE_URL=database-url:latest" \
            --quiet

      - name: "Deploy: file-upload-api"
        if: contains(matrix.service, 'workers-pool')
        run: |
          gcloud run deploy file-upload-api \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu/file-upload-api:${{ steps.image.outputs.tag }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 2 \
            --concurrency 50 \
            --timeout 300 \
            --max-instances 50 \
            --min-instances 0 \
            --ingress all \
            --set-env-vars "ENVIRONMENT=production" \
            --set-secrets "DATABASE_URL=database-url:latest,SUPABASE_KEY=supabase-key:latest" \
            --quiet

      - name: "Deploy: embedding-service"
        if: contains(matrix.service, 'embedding-service')
        run: |
          gcloud run deploy embedding-service \
            --image ${{ steps.image.outputs.uri }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --concurrency 50 \
            --timeout 60 \
            --max-instances 50 \
            --min-instances 1 \
            --ingress internal \
            --set-env-vars "EMBEDDING_MODEL_DEVICE=cpu" \
            --quiet

      - name: Create deployment summary
        if: always()
        run: |
          echo "## Cloud Run Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service Group**: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag**: ${{ steps.image.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region**: ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Services" >> $GITHUB_STEP_SUMMARY
          gcloud run services list --region ${{ env.REGION }} --format="table(name,image)" || echo "No services found"

  post-deploy-tests:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Test atendente-core health
        run: |
          URL=$(gcloud run services describe atendente-core --region us-east1 --format 'value(status.url)')
          curl -f "$URL/health" || echo "Health check failed"

      - name: Test embedding-service health
        run: |
          URL=$(gcloud run services describe embedding-service --region us-east1 --format 'value(status.url)')
          curl -f "$URL/health" || echo "Health check failed"

      - name: List all deployed services
        run: |
          echo "### All Cloud Run Services" >> $GITHUB_STEP_SUMMARY
          gcloud run services list --region us-east1 --format="table(name,status.url)"
