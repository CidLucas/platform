name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'libs/**'
      - 'apps/vizu_dashboard/**'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - atendente_core
          - tool_pool_api
          - analytics_api
          - data_ingestion_api
          - vizu_dashboard

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: southamerica-east1
  REGISTRY: southamerica-east1-docker.pkg.dev

jobs:
  # =================================================================
  # Pre-flight checks
  # =================================================================
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.services.outputs.list }}
    steps:
      - name: Validate required secrets
        run: |
          echo "## 🔍 Preflight Checks" >> $GITHUB_STEP_SUMMARY
          ERRORS=0

          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "❌ GCP_PROJECT_ID secret is not set" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ GCP_PROJECT_ID is configured" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ GCP_SA_KEY secret is not set" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ GCP_SA_KEY is configured" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "### ❌ Preflight failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### ✅ All preflight checks passed" >> $GITHUB_STEP_SUMMARY

      - name: Set services to deploy
        id: services
        run: |
          if [ "${{ github.event.inputs.service }}" == "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            echo 'list=["atendente_core", "tool_pool_api", "analytics_api", "data_ingestion_api", "vizu_dashboard"]' >> $GITHUB_OUTPUT
          else
            echo 'list=["${{ github.event.inputs.service }}"]' >> $GITHUB_OUTPUT
          fi

  # =================================================================
  # Sync secrets to GCP Secret Manager
  # =================================================================
  sync-secrets:
    name: Sync Secrets to GCP
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync GitHub Secrets to GCP Secret Manager
        env:
          PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          if [ -z "$PROJECT_ID" ]; then
            echo "❌ ERROR: GCP_PROJECT_ID secret is not set"
            exit 1
          fi

          echo "Using project: $PROJECT_ID"

          sync_secret() {
            local SECRET_NAME=$1
            local SECRET_VALUE=$2

            if [ -z "$SECRET_VALUE" ]; then
              echo "⚠️  Skipping $SECRET_NAME (not set)"
              return 0
            fi

            if gcloud secrets describe "$SECRET_NAME" --project="$PROJECT_ID" &>/dev/null; then
              echo -n "$SECRET_VALUE" | gcloud secrets versions add "$SECRET_NAME" \
                --data-file=- --project="$PROJECT_ID" &>/dev/null
              echo "✓ Updated: $SECRET_NAME"
            else
              echo -n "$SECRET_VALUE" | gcloud secrets create "$SECRET_NAME" \
                --replication-policy="automatic" \
                --data-file=- --project="$PROJECT_ID" &>/dev/null
              echo "✓ Created: $SECRET_NAME"
            fi
          }

          echo "### Syncing secrets to GCP Secret Manager"

          # Core infrastructure
          sync_secret "SUPABASE_URL" "${{ secrets.SUPABASE_URL }}"
          sync_secret "SUPABASE_SERVICE_KEY" "${{ secrets.SUPABASE_SERVICE_KEY }}"
          sync_secret "SUPABASE_JWT_SECRET" "${{ secrets.SUPABASE_JWT_SECRET }}"

          # LLM Providers
          sync_secret "GOOGLE_API_KEY" "${{ secrets.GOOGLE_API_KEY }}"
          sync_secret "OPENAI_API_KEY" "${{ secrets.OPENAI_API_KEY }}"
          sync_secret "ANTHROPIC_API_KEY" "${{ secrets.ANTHROPIC_API_KEY }}"

          # Qdrant
          sync_secret "QDRANT_URL" "${{ secrets.QDRANT_URL }}"
          sync_secret "QDRANT_API_KEY" "${{ secrets.QDRANT_API_KEY }}"

          # Observability
          sync_secret "LANGFUSE_PUBLIC_KEY" "${{ secrets.LANGFUSE_PUBLIC_KEY }}"
          sync_secret "LANGFUSE_SECRET_KEY" "${{ secrets.LANGFUSE_SECRET_KEY }}"

          # MCP / OAuth
          sync_secret "MCP_AUTH_GOOGLE_CLIENT_ID" "${{ secrets.MCP_AUTH_GOOGLE_CLIENT_ID }}"
          sync_secret "CREDENTIALS_ENCRYPTION_KEY" "${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}"

          echo "✅ Secrets synced"

  # =================================================================
  # Deploy services to Cloud Run
  # =================================================================
  deploy:
    name: Deploy ${{ matrix.service }}
    needs: [preflight, sync-secrets]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.preflight.outputs.services) }}
      fail-fast: false
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ matrix.service }}
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu-mono"
          SERVICE="${{ matrix.service }}"
          IMAGE="${REGISTRY}/vizu-${SERVICE}:latest"

          echo "### 🚀 Deploying ${SERVICE}" >> $GITHUB_STEP_SUMMARY

          # Verify image exists
          if ! gcloud artifacts docker images describe "${IMAGE}" --verbosity=none 2>/dev/null; then
            echo "❌ Image not found: ${IMAGE}" >> $GITHUB_STEP_SUMMARY
            echo "Run CI workflow first to build and push images." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Service-specific configuration
          case "${SERVICE}" in
            atendente_core)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region ${{ env.REGION }} \
                --platform managed \
                --allow-unauthenticated \
                --memory 2Gi --cpu 2 \
                --concurrency 10 --timeout 3600 \
                --max-instances 50 --min-instances 0 \
                --port 8000 \
                --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,LLM_PROVIDER=google,LANGFUSE_HOST=https://us.cloud.langfuse.com,TOOL_POOL_URL=https://vizu-tool-pool-api-858493958314.southamerica-east1.run.app,CORS_ORIGINS=https://vizu-dashboard-858493958314.southamerica-east1.run.app" \
                --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest,SUPABASE_JWT_SECRET=SUPABASE_JWT_SECRET:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,QDRANT_URL=QDRANT_URL:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,LANGFUSE_PUBLIC_KEY=LANGFUSE_PUBLIC_KEY:latest,LANGFUSE_SECRET_KEY=LANGFUSE_SECRET_KEY:latest" \
                --quiet
              ;;

            tool_pool_api)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region ${{ env.REGION }} \
                --platform managed \
                --allow-unauthenticated \
                --memory 2Gi --cpu 2 \
                --concurrency 5 --timeout 3600 \
                --max-instances 20 --min-instances 0 \
                --port 8000 \
                --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,LLM_PROVIDER=google,CORS_ORIGINS=https://vizu-dashboard-858493958314.southamerica-east1.run.app,https://vizu-atendente-core-858493958314.southamerica-east1.run.app" \
                --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest,GOOGLE_API_KEY=GOOGLE_API_KEY:latest,QDRANT_URL=QDRANT_URL:latest,QDRANT_API_KEY=QDRANT_API_KEY:latest,LANGFUSE_PUBLIC_KEY=LANGFUSE_PUBLIC_KEY:latest,LANGFUSE_SECRET_KEY=LANGFUSE_SECRET_KEY:latest,MCP_AUTH_GOOGLE_CLIENT_ID=MCP_AUTH_GOOGLE_CLIENT_ID:latest,CREDENTIALS_ENCRYPTION_KEY=CREDENTIALS_ENCRYPTION_KEY:latest" \
                --quiet
              ;;

            analytics_api)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region ${{ env.REGION }} \
                --platform managed \
                --allow-unauthenticated \
                --memory 1Gi --cpu 1 \
                --concurrency 50 --timeout 300 \
                --max-instances 20 --min-instances 0 \
                --port 8000 \
                --set-env-vars "ENVIRONMENT=production,CORS_ORIGINS=https://vizu-dashboard-858493958314.southamerica-east1.run.app" \
                --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest" \
                --quiet
              ;;

            data_ingestion_api)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region ${{ env.REGION }} \
                --platform managed \
                --allow-unauthenticated \
                --memory 1Gi --cpu 1 \
                --concurrency 50 --timeout 300 \
                --max-instances 20 --min-instances 0 \
                --port 8000 \
                --set-env-vars "ENVIRONMENT=production,CORS_ORIGINS=https://vizu-dashboard-858493958314.southamerica-east1.run.app" \
                --set-secrets="SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_KEY=SUPABASE_SERVICE_KEY:latest" \
                --quiet
              ;;

            vizu_dashboard)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region ${{ env.REGION }} \
                --platform managed \
                --allow-unauthenticated \
                --memory 256Mi --cpu 1 \
                --concurrency 100 --timeout 60 \
                --max-instances 10 --min-instances 0 \
                --port 80 \
                --quiet
              ;;
          esac

          # Get service URL
          URL=$(gcloud run services describe "${SERVICE}" --region ${{ env.REGION }} --format 'value(status.url)')
          echo "✅ **${SERVICE}**: ${URL}" >> $GITHUB_STEP_SUMMARY

  # =================================================================
  # Post-deploy: Update service URLs
  # =================================================================
  post-deploy:
    name: Post-Deploy Configuration
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get service URLs and update inter-service communication
        run: |
          echo "### 📋 Deployed Services" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY

          # Get all service URLs
          ATENDENTE_URL=$(gcloud run services describe atendente_core --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "not deployed")
          TOOL_POOL_URL=$(gcloud run services describe tool_pool_api --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "not deployed")
          ANALYTICS_URL=$(gcloud run services describe analytics_api --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "not deployed")
          DATA_INGESTION_URL=$(gcloud run services describe data_ingestion_api --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "not deployed")
          DASHBOARD_URL=$(gcloud run services describe vizu_dashboard --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "not deployed")

          echo "| atendente_core | ${ATENDENTE_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| tool_pool_api | ${TOOL_POOL_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| analytics_api | ${ANALYTICS_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| data_ingestion_api | ${DATA_INGESTION_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| vizu_dashboard | ${DASHBOARD_URL} |" >> $GITHUB_STEP_SUMMARY

          # Update atendente_core with tool_pool_api URL (MCP_SERVER_URL)
          if [ "${TOOL_POOL_URL}" != "not deployed" ] && [ "${ATENDENTE_URL}" != "not deployed" ]; then
            echo ""
            echo "Updating atendente_core with MCP_SERVER_URL..."
            gcloud run services update atendente_core \
              --region ${{ env.REGION }} \
              --update-env-vars "MCP_SERVER_URL=${TOOL_POOL_URL}/mcp/" \
              --quiet
            echo "✅ Updated MCP_SERVER_URL"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎉 Deployment Complete" >> $GITHUB_STEP_SUMMARY
