name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'libs/**'
      - 'apps/vizu_dashboard/**'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - atendente-core
          - tool-pool-api
          - analytics-api
          - data-ingestion-api
          - vizu-dashboard

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: southamerica-east1
  REGISTRY: southamerica-east1-docker.pkg.dev

jobs:
  # =================================================================
  # Pre-flight checks
  # =================================================================
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.services.outputs.list }}
    steps:
      - name: Validate required secrets
        run: |
          echo "## 🔍 Preflight Checks" >> $GITHUB_STEP_SUMMARY
          ERRORS=0

          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "❌ GCP_PROJECT_ID secret is not set" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ GCP_PROJECT_ID is configured" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ GCP_SA_KEY secret is not set" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ GCP_SA_KEY is configured" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -z "${{ secrets.SUPABASE_URL }}" ]; then
            echo "❌ SUPABASE_URL secret is not set" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ SUPABASE_URL is configured" >> $GITHUB_STEP_SUMMARY
          fi

          if [ $ERRORS -gt 0 ]; then
            echo "### ❌ Preflight failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### ✅ All preflight checks passed" >> $GITHUB_STEP_SUMMARY

      - name: Set services to deploy
        id: services
        run: |
          if [ "${{ github.event.inputs.service }}" == "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            echo 'list=["atendente-core", "tool-pool-api", "analytics-api", "data-ingestion-api", "vizu-dashboard"]' >> $GITHUB_OUTPUT
          else
            echo 'list=["${{ github.event.inputs.service }}"]' >> $GITHUB_OUTPUT
          fi

  # =================================================================
  # Deploy services to Cloud Run (secrets passed directly as env vars)
  # No GCP Secret Manager needed - uses GitHub Secrets directly
  # =================================================================
  deploy:
    name: Deploy ${{ matrix.service }}
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.preflight.outputs.services) }}
      fail-fast: false
    env:
      GCP_REGION: southamerica-east1
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy ${{ matrix.service }}
        env:
          # Core infrastructure secrets (from GitHub)
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          # LLM Providers
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Qdrant
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          # Observability
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          # MCP / OAuth
          MCP_AUTH_GOOGLE_CLIENT_ID: ${{ secrets.MCP_AUTH_GOOGLE_CLIENT_ID }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
        run: |
          REGISTRY="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu-mono"
          SERVICE="${{ matrix.service }}"
          # Convert service name to image name (underscores for image)
          IMAGE_NAME=$(echo "${SERVICE}" | tr '-' '_')
          IMAGE="${REGISTRY}/vizu-${IMAGE_NAME}:latest"

          echo "### 🚀 Deploying ${SERVICE}" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${IMAGE}" >> $GITHUB_STEP_SUMMARY

          # Verify image exists
          if ! gcloud artifacts docker images describe "${IMAGE}" --verbosity=none 2>/dev/null; then
            echo "❌ Image not found: ${IMAGE}" >> $GITHUB_STEP_SUMMARY
            echo "Run CI workflow first to build and push images." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Service-specific configuration (service names use hyphens for Cloud Run)
          case "${SERVICE}" in
            atendente-core)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region "${GCP_REGION}" \
                --platform managed \
                --allow-unauthenticated \
                --memory 2Gi --cpu 2 \
                --concurrency 10 --timeout 3600 \
                --max-instances 50 --min-instances 0 \
                --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,LLM_PROVIDER=google,LANGFUSE_HOST=https://us.cloud.langfuse.com,TOOL_POOL_URL=https://tool-pool-api-858493958314.southamerica-east1.run.app,CORS_ORIGINS=https://vizu-dashboard-858493958314.southamerica-east1.run.app,SUPABASE_URL=${SUPABASE_URL},SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY},SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET},GOOGLE_API_KEY=${GOOGLE_API_KEY},QDRANT_URL=${QDRANT_URL},QDRANT_API_KEY=${QDRANT_API_KEY},LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY},LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}" \
                --quiet
              ;;

            tool-pool-api)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region "${GCP_REGION}" \
                --platform managed \
                --allow-unauthenticated \
                --memory 2Gi --cpu 2 \
                --concurrency 5 --timeout 3600 \
                --max-instances 20 --min-instances 0 \
                --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO,LLM_PROVIDER=google,CORS_ORIGINS=https://vizu-dashboard-858493958314.southamerica-east1.run.app,SUPABASE_URL=${SUPABASE_URL},SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY},GOOGLE_API_KEY=${GOOGLE_API_KEY},QDRANT_URL=${QDRANT_URL},QDRANT_API_KEY=${QDRANT_API_KEY},LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY},LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY},MCP_AUTH_GOOGLE_CLIENT_ID=${MCP_AUTH_GOOGLE_CLIENT_ID},CREDENTIALS_ENCRYPTION_KEY=${CREDENTIALS_ENCRYPTION_KEY}" \
                --quiet
              ;;

            analytics-api)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region "${GCP_REGION}" \
                --platform managed \
                --allow-unauthenticated \
                --memory 1Gi --cpu 1 \
                --concurrency 50 --timeout 300 \
                --max-instances 20 --min-instances 0 \
                --set-env-vars "ENVIRONMENT=production,CORS_ORIGINS=https://vizu-dashboard-858493958314.southamerica-east1.run.app,SUPABASE_URL=${SUPABASE_URL},SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}" \
                --quiet
              ;;

            data-ingestion-api)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region "${GCP_REGION}" \
                --platform managed \
                --allow-unauthenticated \
                --memory 1Gi --cpu 1 \
                --concurrency 50 --timeout 300 \
                --max-instances 20 --min-instances 0 \
                --set-env-vars "ENVIRONMENT=production,CORS_ORIGINS=https://vizu-dashboard-858493958314.southamerica-east1.run.app,SUPABASE_URL=${SUPABASE_URL},SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}" \
                --quiet
              ;;

            vizu-dashboard)
              gcloud run deploy "${SERVICE}" \
                --image "${IMAGE}" \
                --region "${GCP_REGION}" \
                --platform managed \
                --allow-unauthenticated \
                --memory 256Mi --cpu 1 \
                --concurrency 100 --timeout 60 \
                --max-instances 10 --min-instances 0 \
                --port 80 \
                --quiet
              ;;
          esac

          # Get service URL
          URL=$(gcloud run services describe "${SERVICE}" --region "${GCP_REGION}" --format 'value(status.url)')
          echo "✅ **${SERVICE}**: ${URL}" >> $GITHUB_STEP_SUMMARY

  # =================================================================
  # Post-deploy: Update service URLs
  # =================================================================
  post-deploy:
    name: Post-Deploy Configuration
    needs: deploy
    runs-on: ubuntu-latest
    env:
      GCP_REGION: southamerica-east1
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get service URLs and update inter-service communication
        run: |
          echo "### 📋 Deployed Services" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY

          # Get all service URLs (using hyphenated names for Cloud Run)
          ATENDENTE_URL=$(gcloud run services describe atendente-core --region "${GCP_REGION}" --format 'value(status.url)' 2>/dev/null || echo "not deployed")
          TOOL_POOL_URL=$(gcloud run services describe tool-pool-api --region "${GCP_REGION}" --format 'value(status.url)' 2>/dev/null || echo "not deployed")
          ANALYTICS_URL=$(gcloud run services describe analytics-api --region "${GCP_REGION}" --format 'value(status.url)' 2>/dev/null || echo "not deployed")
          DATA_INGESTION_URL=$(gcloud run services describe data-ingestion-api --region "${GCP_REGION}" --format 'value(status.url)' 2>/dev/null || echo "not deployed")
          DASHBOARD_URL=$(gcloud run services describe vizu-dashboard --region "${GCP_REGION}" --format 'value(status.url)' 2>/dev/null || echo "not deployed")

          echo "| atendente-core | ${ATENDENTE_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| tool-pool-api | ${TOOL_POOL_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| analytics-api | ${ANALYTICS_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| data-ingestion-api | ${DATA_INGESTION_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| vizu-dashboard | ${DASHBOARD_URL} |" >> $GITHUB_STEP_SUMMARY

          # Update atendente-core with tool-pool-api URL (MCP_SERVER_URL)
          if [ "${TOOL_POOL_URL}" != "not deployed" ] && [ "${ATENDENTE_URL}" != "not deployed" ]; then
            echo ""
            echo "Updating atendente-core with MCP_SERVER_URL..."
            gcloud run services update atendente-core \
              --region "${GCP_REGION}" \
              --update-env-vars "MCP_SERVER_URL=${TOOL_POOL_URL}/mcp/" \
              --quiet
            echo "✅ Updated MCP_SERVER_URL"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎉 Deployment Complete" >> $GITHUB_STEP_SUMMARY
