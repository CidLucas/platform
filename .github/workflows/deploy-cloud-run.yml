name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'services/**'
      - 'libs/**'
      - 'docker-compose.prod.yml'
      - '.github/workflows/deploy-cloud-run.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all")'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - agents-pool
          - workers-pool

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-east1
  REGISTRY: us-east1-docker.pkg.dev
  GCP_SA_EMAIL: ${{ secrets.GCP_SA_EMAIL }}

jobs:
  # =================================================================
  # Pre-flight checks - validate secrets and configuration
  # =================================================================
  preflight:
    name: Preflight Checks
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.services.outputs.list }}
      timestamp: ${{ steps.timestamp.outputs.value }}
      project_id: ${{ steps.validate.outputs.project_id }}
    steps:
      - name: Validate required secrets
        id: validate
        run: |
          echo "## 🔍 Preflight Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ERRORS=0

          # Check GCP_PROJECT_ID
          if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
            echo "❌ **GCP_PROJECT_ID** secret is not set" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ GCP_PROJECT_ID is configured" >> $GITHUB_STEP_SUMMARY
            echo "project_id=${{ secrets.GCP_PROJECT_ID }}" >> $GITHUB_OUTPUT
          fi

          # Check GCP_SA_KEY
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "❌ **GCP_SA_KEY** secret is not set" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ GCP_SA_KEY is configured" >> $GITHUB_STEP_SUMMARY
          fi

          # Check GCP_SA_EMAIL
          if [ -z "${{ secrets.GCP_SA_EMAIL }}" ]; then
            echo "⚠️ GCP_SA_EMAIL secret is not set (optional)" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ GCP_SA_EMAIL is configured" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $ERRORS -gt 0 ]; then
            echo "### ❌ Preflight failed with $ERRORS error(s)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please configure the missing secrets in:" >> $GITHUB_STEP_SUMMARY
            echo "**Settings → Secrets and variables → Actions**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "### ✅ All preflight checks passed" >> $GITHUB_STEP_SUMMARY

      - name: Set services to deploy
        id: services
        run: |
          if [ "${{ github.event.inputs.service }}" == "all" ] || [ -z "${{ github.event.inputs.service }}" ]; then
            echo 'list=["agents-pool", "workers-pool"]' >> $GITHUB_OUTPUT
          else
            echo 'list=["${{ github.event.inputs.service }}"]' >> $GITHUB_OUTPUT
          fi

      - name: Set timestamp
        id: timestamp
        run: echo "value=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT

  # =================================================================
  # Build and Deploy
  # =================================================================
  build-and-deploy:
    name: Build & Deploy ${{ matrix.service }}
    needs: preflight
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.preflight.outputs.services) }}
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize job summary
        run: |
          echo "## 🚀 Deploy: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Project** | \`${{ env.PROJECT_ID }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Region** | \`${{ env.REGION }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ env.REGISTRY }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Set image tag
        id: image
        run: |
          COMMIT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=${{ needs.preflight.outputs.timestamp }}
          IMAGE_TAG="${TIMESTAMP}-${COMMIT_SHA}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT

          echo "### 🏷️ Image Tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

      # =================================================================
      # Build & Push: agents-pool
      # =================================================================
      - name: "Build: agents-pool"
        if: matrix.service == 'agents-pool'
        id: build-agents
        run: |
          echo "### 🔨 Building agents-pool services" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TAG="${{ steps.image.outputs.tag }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu-mono"

          build_and_push() {
            local name=$1
            local dockerfile=$2
            local image="${REGISTRY}/${name}:${TAG}"

            echo "Building ${name}..."
            if docker build -t "${image}" -f "${dockerfile}" .; then
              echo "Pushing ${name}..."
              if docker push "${image}"; then
                echo "- ✅ **${name}**: \`${image}\`" >> $GITHUB_STEP_SUMMARY
                return 0
              fi
            fi
            echo "- ❌ **${name}**: Build/push failed" >> $GITHUB_STEP_SUMMARY
            return 1
          }

          FAILED=0

          build_and_push "atendente-core" "services/atendente_core/Dockerfile" || FAILED=$((FAILED + 1))
          build_and_push "tool-pool-api" "services/tool_pool_api/Dockerfile" || FAILED=$((FAILED + 1))
          build_and_push "vendas-agent" "services/vendas_agent/Dockerfile" || FAILED=$((FAILED + 1))
          build_and_push "support-agent" "services/support_agent/Dockerfile" || FAILED=$((FAILED + 1))

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $FAILED -gt 0 ]; then
            echo "❌ $FAILED service(s) failed to build" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ All agents-pool services built successfully" >> $GITHUB_STEP_SUMMARY

      # =================================================================
      # Build & Push: workers-pool
      # =================================================================
      - name: "Build: workers-pool"
        if: matrix.service == 'workers-pool'
        id: build-workers
        run: |
          echo "### 🔨 Building workers-pool services" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TAG="${{ steps.image.outputs.tag }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu-mono"

          build_and_push() {
            local name=$1
            local dockerfile=$2
            local image="${REGISTRY}/${name}:${TAG}"

            echo "Building ${name}..."
            if docker build -t "${image}" -f "${dockerfile}" .; then
              echo "Pushing ${name}..."
              if docker push "${image}"; then
                echo "- ✅ **${name}**: \`${image}\`" >> $GITHUB_STEP_SUMMARY
                return 0
              fi
            fi
            echo "- ❌ **${name}**: Build/push failed" >> $GITHUB_STEP_SUMMARY
            return 1
          }

          FAILED=0

          build_and_push "data-ingestion-worker" "services/data_ingestion_worker/Dockerfile" || FAILED=$((FAILED + 1))
          build_and_push "file-processing-worker" "services/file_processing_worker/Dockerfile" || FAILED=$((FAILED + 1))
          build_and_push "file-upload-api" "services/file_upload_api/Dockerfile" || FAILED=$((FAILED + 1))

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $FAILED -gt 0 ]; then
            echo "❌ $FAILED service(s) failed to build" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "✅ All workers-pool services built successfully" >> $GITHUB_STEP_SUMMARY

      # =================================================================
      # Deploy: agents-pool
      # =================================================================
      - name: "Deploy: agents-pool"
        if: matrix.service == 'agents-pool'
        run: |
          echo "### 🚢 Deploying agents-pool to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TAG="${{ steps.image.outputs.tag }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu-mono"

          deploy_service() {
            local name=$1
            local image="${REGISTRY}/${name}:${TAG}"
            shift

            echo "Deploying ${name}..."
            if gcloud run deploy "${name}" \
              --image "${image}" \
              --region ${{ env.REGION }} \
              --platform managed \
              "$@" \
              --quiet; then
              URL=$(gcloud run services describe "${name}" --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "N/A")
              echo "- ✅ **${name}**: ${URL}" >> $GITHUB_STEP_SUMMARY
              return 0
            fi
            echo "- ❌ **${name}**: Deploy failed" >> $GITHUB_STEP_SUMMARY
            return 1
          }

          FAILED=0

          # atendente-core (main entry point - public)
          deploy_service "atendente-core" \
            --allow-unauthenticated \
            --memory 2Gi --cpu 2 \
            --concurrency 10 --timeout 3600 \
            --max-instances 50 --min-instances 1 \
            --ingress all \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" || FAILED=$((FAILED + 1))

          # tool-pool-api (internal)
          deploy_service "tool-pool-api" \
            --no-allow-unauthenticated \
            --memory 2Gi --cpu 2 \
            --concurrency 5 --timeout 3600 \
            --max-instances 20 --min-instances 1 \
            --port 9000 --ingress internal \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" || FAILED=$((FAILED + 1))

          # vendas-agent (internal)
          deploy_service "vendas-agent" \
            --no-allow-unauthenticated \
            --memory 2Gi --cpu 2 \
            --concurrency 10 --timeout 3600 \
            --max-instances 20 --min-instances 0 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" || FAILED=$((FAILED + 1))

          # support-agent (internal)
          deploy_service "support-agent" \
            --no-allow-unauthenticated \
            --memory 2Gi --cpu 2 \
            --concurrency 10 --timeout 3600 \
            --max-instances 20 --min-instances 0 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production,LOG_LEVEL=INFO" || FAILED=$((FAILED + 1))

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $FAILED -gt 0 ]; then
            echo "⚠️ $FAILED service(s) failed to deploy" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All agents-pool services deployed successfully" >> $GITHUB_STEP_SUMMARY
          fi

      # =================================================================
      # Deploy: workers-pool
      # =================================================================
      - name: "Deploy: workers-pool"
        if: matrix.service == 'workers-pool'
        run: |
          echo "### 🚢 Deploying workers-pool to Cloud Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          TAG="${{ steps.image.outputs.tag }}"
          REGISTRY="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/vizu-mono"

          deploy_service() {
            local name=$1
            local image="${REGISTRY}/${name}:${TAG}"
            shift

            echo "Deploying ${name}..."
            if gcloud run deploy "${name}" \
              --image "${image}" \
              --region ${{ env.REGION }} \
              --platform managed \
              "$@" \
              --quiet; then
              URL=$(gcloud run services describe "${name}" --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null || echo "N/A")
              echo "- ✅ **${name}**: ${URL}" >> $GITHUB_STEP_SUMMARY
              return 0
            fi
            echo "- ❌ **${name}**: Deploy failed" >> $GITHUB_STEP_SUMMARY
            return 1
          }

          FAILED=0

          # data-ingestion-worker (internal)
          deploy_service "data-ingestion-worker" \
            --no-allow-unauthenticated \
            --memory 1Gi --cpu 2 \
            --concurrency 50 --timeout 600 \
            --max-instances 100 --min-instances 0 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production" || FAILED=$((FAILED + 1))

          # file-processing-worker (internal)
          deploy_service "file-processing-worker" \
            --no-allow-unauthenticated \
            --memory 2Gi --cpu 2 \
            --concurrency 20 --timeout 1800 \
            --max-instances 50 --min-instances 0 \
            --ingress internal \
            --set-env-vars "ENVIRONMENT=production" || FAILED=$((FAILED + 1))

          # file-upload-api (public)
          deploy_service "file-upload-api" \
            --allow-unauthenticated \
            --memory 1Gi --cpu 2 \
            --concurrency 50 --timeout 300 \
            --max-instances 50 --min-instances 0 \
            --ingress all \
            --set-env-vars "ENVIRONMENT=production" || FAILED=$((FAILED + 1))

          echo "" >> $GITHUB_STEP_SUMMARY

          if [ $FAILED -gt 0 ]; then
            echo "⚠️ $FAILED service(s) failed to deploy" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ All workers-pool services deployed successfully" >> $GITHUB_STEP_SUMMARY
          fi

      # =================================================================
      # Final summary
      # =================================================================
      - name: Final status
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "## ✅ Deployment Complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the logs above for details." >> $GITHUB_STEP_SUMMARY
          fi

  # =================================================================
  # Post-deploy health checks
  # =================================================================
  health-checks:
    name: Health Checks
    needs: build-and-deploy
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run health checks
        run: |
          echo "## 🏥 Health Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          check_health() {
            local name=$1
            local url

            url=$(gcloud run services describe "${name}" --region ${{ env.REGION }} --format 'value(status.url)' 2>/dev/null)

            if [ -z "$url" ]; then
              echo "- ⚠️ **${name}**: Service not found" >> $GITHUB_STEP_SUMMARY
              return 1
            fi

            if curl -sf "${url}/health" > /dev/null 2>&1; then
              echo "- ✅ **${name}**: Healthy" >> $GITHUB_STEP_SUMMARY
              return 0
            else
              echo "- ❌ **${name}**: Health check failed" >> $GITHUB_STEP_SUMMARY
              return 1
            fi
          }

          # Check public services
          check_health "atendente-core" || true
          check_health "file-upload-api" || true

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 All Services" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          gcloud run services list --region ${{ env.REGION }} --format="table(name,status.url)" >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No services found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
