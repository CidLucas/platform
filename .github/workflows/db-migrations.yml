name: DB Migrations (CI)

on:
  pull_request:
    paths:
      - 'libs/vizu_db_connector/**'
      - 'libs/vizu_models/**'
      - 'libs/vizu_db_connector/alembic/**'

jobs:
  apply-migrations-test-db:
    name: Apply migrations to test DB
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: python -m pip install --upgrade pip && pip install poetry

      - name: Install vizu_db_connector deps
        working-directory: libs/vizu_db_connector
        run: |
          poetry config virtualenvs.in-project true
          poetry install --no-interaction --no-ansi

      - name: Run migrations against test DB
        working-directory: libs/vizu_db_connector
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
        run: |
          poetry run python run_migrations.py

  lint-migrations:
    name: Lint migration files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new SQL in alembic versions
        run: |
          # Ensure Alembic SQL is not empty for new migrations
          git --no-pager diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep 'libs/vizu_db_connector/alembic/versions' || exit 0
          # Fail if any new migration file is empty
          for f in $(git --no-pager diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep 'libs/vizu_db_connector/alembic/versions' || true); do
            if [ ! -s "$f" ]; then
              echo "Migration $f is empty"; exit 1;
            fi
          done

  push-migrations-supabase:
    name: Push migrations to Supabase
    runs-on: ubuntu-latest
    needs: apply-migrations-test-db
    if: ${{ secrets.SUPABASE_ACCESS_TOKEN != '' && secrets.SUPABASE_PROJECT_REF != '' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install supabase CLI
        run: |
          npm install -g supabase

      - name: Push migrations to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          echo "supabase version:" && supabase --version || true
          # ensure we are linked to the intended project
          supabase link --project-ref "${SUPABASE_PROJECT_REF}" || true
          # push DB migrations non-interactively
          supabase db push --non-interactive --project-ref "${SUPABASE_PROJECT_REF}"
