name: Deploy Production (App)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    # Só roda se os secrets de SSH estiverem configurados
    if: ${{ secrets.SSH_HOST != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Copia os arquivos de configuração para o servidor
      - name: Copy config files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          # Copia apenas o necessário para subir o Docker
          source: "docker-compose.yml,docker-configs/"
          target: "~/vizu-mono"

      # 2. Acessa via SSH e faz o Deploy
      - name: Remote SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd ~/vizu-mono

            # --- A. CRIAÇÃO DO ARQUIVO .ENV DE PRODUÇÃO ---
            # Injetamos os segredos do GitHub no servidor
            echo "COMPOSE_PROFILES=production" > .env
            echo "DB_MODE=supabase_api" >> .env

            # Banco de Dados (Aponta para o Supabase)
            echo "DATABASE_URL=${{ secrets.SUPABASE_DATABASE_URL }}" >> .env
            echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
            echo "SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}" >> .env
            echo "SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}" >> .env

            # Chaves de API / Integrações
            echo "LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }}" >> .env
            echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> .env
            echo "CREDENTIALS_ENCRYPTION_KEY=${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}" >> .env

            # GCP
            echo "GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> .env
            echo "GCS_BUCKET_NAME=${{ secrets.GCS_BUCKET_NAME }}" >> .env
            echo "PUBSUB_TOPIC_ID=${{ secrets.PUBSUB_TOPIC_ID }}" >> .env
            echo "PUBSUB_SUBSCRIPTION_ID=${{ secrets.PUBSUB_SUBSCRIPTION_ID }}" >> .env

            # --- B. ATUALIZAÇÃO DOS CONTAINERS ---
            # Baixa as últimas alterações de código se você usa git pull no server (opcional)
            # git pull origin main

            # Reconstrói as imagens (necessário pois seu docker-compose usa 'build: .')
            # O perfil 'production' garante que o postgres local NÃO suba
            docker compose --profile production down
            docker compose --profile production up -d --build --remove-orphans

            # Limpa imagens antigas para economizar espaço
            docker image prune -f