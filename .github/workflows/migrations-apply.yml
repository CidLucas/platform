name: Migrations Apply (manual)

# Manual workflow to apply Alembic migrations to a target DB (e.g., Supabase).
# This workflow is intended to be run with care (use environment protections).
on:
  workflow_dispatch:
    inputs:
      db_url_secret:
        description: 'Name of the repository secret that contains the DB URL (default SUPABASE_DB_URL)'
        required: false
        default: SUPABASE_DB_URL

jobs:
  apply:
    # If you configure an environment named 'production' with reviewers, GitHub will require approval.
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Resolve DB URL from secrets
        id: db
        run: |
          SECRET_NAME="${{ github.event.inputs.db_url_secret }}"
          if [ -z "$SECRET_NAME" ]; then
            SECRET_NAME=SUPABASE_DB_URL
          fi
          echo "Using secret: $SECRET_NAME"
          # The workflow uses a mapping to access the secret by known names. Ensure the secret exists.
          if [ -n "${{ secrets.SUPABASE_DB_URL }}" ] && [ "$SECRET_NAME" = "SUPABASE_DB_URL" ]; then
            echo "DATABASE_URL=${{ secrets.SUPABASE_DB_URL }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.DATABASE_URL }}" ] && [ "$SECRET_NAME" = "DATABASE_URL" ]; then
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          else
            echo "Error: requested secret name '$SECRET_NAME' not found or not set in repository secrets." >&2
            exit 1
          fi

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install alembic sqlalchemy sqlmodel psycopg2-binary

      - name: Run migrations
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
        run: |
          echo "Running migrations against: ${DATABASE_URL}"
          python ./libs/vizu_db_connector/run_migrations.py --db "${DATABASE_URL}"
