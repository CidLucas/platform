name: Migrations Apply (Supabase - manual)

# Manual workflow to generate SQL from Alembic and apply it to Supabase using the Supabase CLI.
on:
  workflow_dispatch:
    inputs:
      db_url_secret:
        description: 'Name of the repository secret that contains the DB URL (default SUPABASE_DB_URL)'
        required: false
        default: SUPABASE_DB_URL

jobs:
  generate-sql:
    runs-on: ubuntu-latest
    outputs:
      sql-artifact: migration-sql
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install alembic sqlalchemy sqlmodel

      - name: Generate SQL from Alembic (autogenerated revisions must exist)
        env:
          PYTHONPATH: ${{ github.workspace }}/libs/vizu_models/src:${{ github.workspace }}/libs/vizu_db_connector/src
        run: |
          echo "Generating SQL from alembic (alembic.ini at libs/vizu_db_connector/alembic.ini)"
          alembic -c libs/vizu_db_connector/alembic.ini upgrade head --sql > migration.sql

      - name: Upload generated SQL artifact
        uses: actions/upload-artifact@v4
        with:
          name: migration-sql
          path: migration.sql

  apply-sql:
    # Protected apply — requires environment approval (configure reviewers in repo settings)
    needs: generate-sql
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download generated SQL
        uses: actions/download-artifact@v4
        with:
          name: migration-sql
          path: ./

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase Project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "${SUPABASE_PROJECT_ID}" ] || [ -z "${SUPABASE_DB_PASSWORD}" ]; then
            echo "Error: SUPABASE_PROJECT_ID and SUPABASE_DB_PASSWORD must be set in repository secrets." >&2
            exit 1
          fi
          supabase link --project-ref ${SUPABASE_PROJECT_ID} --password ${SUPABASE_DB_PASSWORD}

      - name: Write SQL into `supabase/migrations` and run `supabase db push`
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          set -e
          echo "Preparing supabase/migrations directory"
          mkdir -p supabase/migrations
          TS=$(date -u +%Y%m%d%H%M%S)
          MIG_NAME="${TS}_autogenerated.sql"
          echo "Writing migration to supabase/migrations/$MIG_NAME"
          mv migration.sql supabase/migrations/$MIG_NAME
          ls -l supabase/migrations
          echo "Running supabase db push against project ${SUPABASE_PROJECT_ID}"
          # supabase link already set; run push which applies migrations from supabase/migrations
          supabase db push --password ${SUPABASE_DB_PASSWORD}
