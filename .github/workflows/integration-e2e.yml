name: Integration E2E (Docker Compose)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  integration-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start docker-compose stack
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CREDENTIALS_ENCRYPTION_KEY: ${{ secrets.CREDENTIALS_ENCRYPTION_KEY }}
          OLLAMA_CLOUD_API_KEY: ${{ secrets.OLLAMA_CLOUD_API_KEY }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
        run: |
          docker compose up --build -d
          # Wait for DB and Redis to be healthy (simple wait; replace with healthchecks if available)
          echo "Waiting for services to start..."
          sleep 15

      - name: Run integration tests / e2e script
        run: |
          chmod +x scripts/run_tests_all.sh || true
          if [ -f scripts/run_tests_all.sh ]; then
            ./scripts/run_tests_all.sh
          else
            echo "No scripts/run_tests_all.sh found; run your e2e script here"
            exit 0
          fi

      - name: Collect docker-compose logs
        if: failure()
        run: |
          docker compose logs --no-color > artifacts/docker-compose-logs.txt || true

      - name: Tear down
        if: always()
        run: |
          docker compose down -v || true
