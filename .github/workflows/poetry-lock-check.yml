name: Poetry Lock / Dependency Check

on:
  push:
    paths:
      - '**/pyproject.toml'
      - '.github/workflows/**'
  pull_request:
    paths:
      - '**/pyproject.toml'
      - '.github/workflows/**'
  workflow_dispatch: {}

jobs:
  dependency-check:
    name: Check poetry.lock consistency across projects
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          pip install poetry

      - name: Run poetry lock check script
        shell: bash
        run: |
          set -euo pipefail
          echo "Running repository-wide poetry lockcheck script"
          bash scripts/check_poetry_lock.sh
