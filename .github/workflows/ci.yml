name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # =========================================================================
  # Stage 1: Quick checks (run in parallel)
  # =========================================================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: |
          # Uses config from root pyproject.toml (excludes langfuse, ferramentas)
          ruff check --output-format=github .

  dependency-check:
    name: Poetry Lock Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          echo "$HOME/.local/bin" >> $GITHUB_PATH
      - name: Check pyproject.toml files
        run: |
          echo "Checking pyproject.toml files have valid syntax..."
          for f in $(find . -name "pyproject.toml" -not -path "./langfuse/*" -not -path "./.venv/*"); do
            echo "  Checking $f"
            python3 -c "import tomllib; tomllib.load(open('$f', 'rb'))" || exit 1
          done
          echo "✅ All pyproject.toml files are valid"

  # =========================================================================
  # Stage 2: Build Docker images (all deployable services)
  # =========================================================================
  docker-build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [lint, dependency-check]
    strategy:
      fail-fast: false
      matrix:
        service:
          # Agents pool
          - atendente_core
          - tool_pool_api
          - vendas_agent
          - support_agent
          # Workers pool
          - data_ingestion_worker
          - file_processing_worker
          - file_upload_api
          - data_ingestion_api
          - analytics_api
        include:
          # Frontend dashboard (built from apps/)
          - service: vizu_dashboard
            dockerfile_path: apps/vizu_dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image (linux/amd64)
        run: |
          echo "Building ${{ matrix.service }} (amd64 test build)..."
          DOCKERFILE_PATH="${{ matrix.dockerfile_path || format('services/{0}/Dockerfile', matrix.service) }}"
          # Use buildx to produce an amd64 test image and load it into the runner for size inspection
          docker buildx build --platform linux/amd64 --load -f "${DOCKERFILE_PATH}" -t vizu-${{ matrix.service }}:test .

      - name: Check image size
        run: |
          SIZE=$(docker image inspect vizu-${{ matrix.service }}:test --format='{{.Size}}')
          SIZE_MB=$((SIZE / 1024 / 1024))
          echo "Image size: ${SIZE_MB}MB"

          # Fail if image is larger than 500MB
          if [ $SIZE_MB -gt 500 ]; then
            echo "❌ Image too large: ${SIZE_MB}MB > 500MB"
            exit 1
          fi
          echo "✅ Image size OK: ${SIZE_MB}MB"

  # =========================================================================
  # Stage 3: Publish to GHCR (main branch only)
  # =========================================================================
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          # Agents pool
          - atendente_core
          - tool_pool_api
          - vendas_agent
          - support_agent
          # Workers pool
          - data_ingestion_worker
          - file_processing_worker
          - file_upload_api
          - data_ingestion_api
          - analytics_api
        include:
          # Frontend dashboard (built from apps/)
          - service: vizu_dashboard
            dockerfile_path: apps/vizu_dashboard/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Buildx: Build and push multi-arch to GHCR
        env:
          COMMIT_SHA: ${{ github.sha }}
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          IMAGE: ghcr.io/${{ github.repository_owner }}/vizu-${{ matrix.service }}
        run: |
          DOCKERFILE_PATH="${{ matrix.dockerfile_path || format('services/{0}/Dockerfile', matrix.service) }}"
          COMMIT_SHORT=$(echo $COMMIT_SHA | cut -c1-7)
          echo "Building multi-arch image: $IMAGE"
          # Build and push manifest for amd64 and arm64. Cloud Run requires amd64; including arm64 helps local devs.
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -f "${DOCKERFILE_PATH}" \
            -t "$IMAGE:$COMMIT_SHORT" \
            -t "$IMAGE:latest" \
            --push \
            .

          echo "## 🐳 Published: ${{ matrix.service }}" >> $GITHUB_STEP_SUMMARY
          echo "- \`$IMAGE:$COMMIT_SHORT\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`$IMAGE:latest\`" >> $GITHUB_STEP_SUMMARY

