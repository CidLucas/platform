name: e2e-integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      E2E_API_KEY: ${{ secrets.E2E_API_KEY }}
      CLIENTE_VIZU_ID: ${{ secrets.CLIENTE_VIZU_ID }}
      SERVICE_PORT: 8003
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure docker compose is available
        run: docker compose version

      - name: Build and start docker-compose stack
        run: |
          docker compose up --build -d

      - name: Wait for services to become ready (health check)
        run: |
          set -euo pipefail
          echo "Waiting for services to become ready on localhost:${SERVICE_PORT}..."
          url_base="http://localhost:${SERVICE_PORT}"
          timeout_seconds=120
          interval=2
          start_time=$(date +%s)
          end_time=$((start_time + timeout_seconds))
          while [ $(date +%s) -lt $end_time ]; do
            for p in /health /ready /; do
              if curl -sSf --max-time 3 "${url_base}${p}" >/dev/null 2>&1; then
                echo "Service is ready at ${url_base}${p}"
                exit 0
              fi
            done
            sleep ${interval}
          done
          echo "Timed out waiting for service on ${url_base} after ${timeout_seconds}s" >&2
          echo "Docker compose ps:" >&2
          docker compose ps >&2 || true
          echo "Collecting recent logs for debugging (last 200 lines):" >&2
          docker compose logs --no-color --tail=200 >&2 || true
          exit 1

      - name: Run DB seed (via Makefile)
        run: make seed

      - name: Run JWT e2e smoke
        run: |
          make e2e-jwt SERVICE=atendente_core CLIENTE_VIZU_ID=${{ env.CLIENTE_VIZU_ID }}
        env:
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}

      - name: Run API-key e2e smoke
        run: |
          make e2e-api-key SERVICE=atendente_core CLIENTE_VIZU_ID=${{ env.CLIENTE_VIZU_ID }} E2E_API_KEY=${{ secrets.E2E_API_KEY }}

      - name: Collect logs on success (short)
        if: success()
        run: |
          docker compose ps --services --filter "status=running" || true

      - name: Tear down compose (always)
        if: always()
        run: |
          docker compose down -v --remove-orphans
