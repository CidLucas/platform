# Define a versão do compose para garantir compatibilidade

# Bloco de extensões (YAML Anchors) para definir variáveis comuns
x-common-env:
  # O &common-env define o "apelido" da âncora
  common: &common-env
    DATABASE_URL: postgresql://user:password@postgres:5432/vizu_db
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  atendente: &atendente-env
    REDIS_URL: redis://redis:6379/0
    OLLAMA_BASE_URL: http://ollama_service:11434
    LANGCHAIN_API_KEY: sua_chave_langchain
    TWILIO_AUTH_TOKEN: seu_token_twilio

# Bloco principal que contém a definição de todos os serviços (contêineres).
services:
  postgres:
    image: postgres:15-alpine
    platform: linux/amd64
    container_name: vizu_postgres
    environment:
      # Formato CHAVE: VALOR (mapa)
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vizu_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vizu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-manager:
    container_name: vizu_db_manager
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/db_manager/Dockerfile
    command: ["migrate"]
    environment:
      # --- CORREÇÃO ---
      # O "<<" faz o merge do mapa definido na âncora
      <<: *common-env
      PYTHONPATH: /app/db_manager:/app/libs/vizu_db_connector/src:/app/libs/vizu_shared_models/src:/app/libs/vizu_observability_bootstrap/src
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: vizu_redis_dev
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant_db:
    image: qdrant/qdrant:latest
    container_name: vizu_qdrant_dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./docker-configs/otel-collector/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "13133:13133"

  ollama_service:
    container_name: vizu_ollama_dev
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/ollama_service/Dockerfile
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # Esta checagem continua a mesma...
      test: ["CMD-SHELL", "wget -q --spider http://localhost:11434 || exit 1"]
      interval: 30s
      timeout: 10s
      # Aumentamos as tentativas para 5
      retries: 5
      # --- ESTA É A MUDANÇA MAIS IMPORTANTE ---
      # Dá 5 minutos (300s) de carência para o container iniciar.
      # Falhas de healthcheck durante este período não contam.
      start_period: 300s

  atendente_core:
    container_name: vizu_atendente_core
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/atendente_core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # --- CORREÇÃO ---
      <<: [ *common-env, *atendente-env ]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama_service:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - ./services/atendente_core/src:/app/atendente_core
      - ./libs:/app/libs

  clients_api:
    container_name: clients_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/clients_api/Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./services/clients_api/src:/app/src
      - ./libs:/app/libs
    environment:
      # --- CORREÇÃO ---
      <<: *common-env
      PYTHONPATH: /app/src:/app/libs
      CREDENTIALS_ENCRYPTION_KEY: aemyqQi3hs1d_8-bOKnCs1nmdo5TaDEiEpcbTEiB6vE=
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  clientes_finais_api:
    container_name: clientes_finais_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/clientes_finais_api/Dockerfile
    ports:
      - "8004:8000"
    volumes:
      - ./services/clientes_finais_api/src:/home/appuser/app/src
      - ./libs:/home/appuser/app/libs
    environment:
      # --- CORREÇÃO (Onde o erro aconteceu) ---
      <<: *common-env
      PYTHONPATH: /home/appuser/app:/home/appuser/app/libs
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
    profiles:
      - "clientes-finais"
      - "full"

  analytics_api:
    container_name: analytics_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/analytics_api/Dockerfile
    ports:
      - "8005:80"
    environment:
      # --- CORREÇÃO ---
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started

  evaluation_suite:
    build:
      context: .
      dockerfile: ./ferramentas/evaluation_suite/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - ./ferramentas/evaluation_suite/.env.example
    environment:
      # --- CORREÇÃO ---
      # Convertido de lista para mapa para consistência
      PYTHONPATH: /app/src:/app/libs/vizu_db_connector/src:/app/libs/vizu_shared_models/src
    depends_on:
      postgres:
        condition: service_healthy
      atendente_core:
        condition: service_started

  tool_pool_api:
    container_name: vizu_tool_pool_api
    platform: linux/amd64
    build:
      # O contexto deve ser a raiz do monorepo ('.')
      context: .
      # O caminho para o Dockerfile que você forneceu
      dockerfile: ./services/tool_pool_api/Dockerfile
    ports:
      # Mapeia a porta 8006 (host) para 8000 (container, conforme Dockerfile)
      - "8006:8000"
    volumes:
      # Volume para o código-fonte da API (para hot-reload)
      - ./services/tool_pool_api/src:/app/services/tool_pool_api/src
      # Volume para todas as libs (para hot-reload)
      - ./libs:/app/libs
    environment:
      # Reutiliza as variáveis comuns de banco e observabilidade
      <<: *common-env
      # Define o PYTHONPATH para que o Python encontre o 'src' e as 'libs'
      # Isso espelha a estrutura de pastas do Dockerfile
    depends_on:
      # Depende dos serviços que suas libs utilizam
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama_service:
        condition: service_healthy
      otel-collector:
        condition: service_started

# Bloco principal para definir volumes nomeados, que persistem dados.
volumes:
  postgres_data:
  qdrant_data:
  ollama_data: