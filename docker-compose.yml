# --- DEFINIÇÕES COMUNS ---
x-common-env: &common-env
  # Variáveis Padronizadas Supabase (Primary Data Store)
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY:-${SUPABASE_KEY}}  # Primary variable, fallback to legacy SUPABASE_KEY
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
  SUPABASE_JWT_JWK: ${SUPABASE_JWT_JWK}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-ES256}
  # Legacy PostgreSQL (deprecated - use Supabase REST API instead)
  # Only kept for backward compatibility with tests
  DATABASE_URL: ${DATABASE_URL:-}
  DB_MODE: ${DB_MODE:-supabase}
  # Configs de serviços
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
  EMBEDDING_SERVICE_URL: http://embedding_service:11435
  QDRANT_URL: http://qdrant_db:6333
  # Internal API base (atendente_core is the main entry point)
  BASE_URL: "http://atendente_core:8000"

x-atendente-env: &atendente-env
  REDIS_URL: redis://redis:6379/0
  OLLAMA_BASE_URL: ${OLLAMA_CLOUD_BASE_URL:-https://ollama.com}
  LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
  TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
  # LLM Provider - ollama, ollama_cloud, openai, anthropic, google
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
  # Ollama Cloud
  OLLAMA_CLOUD_API_KEY: ${OLLAMA_CLOUD_API_KEY}
  OLLAMA_CLOUD_BASE_URL: ${OLLAMA_CLOUD_BASE_URL:-https://ollama.com}
  OLLAMA_CLOUD_DEFAULT_MODEL: ${OLLAMA_CLOUD_DEFAULT_MODEL:-gpt-oss:20b}
  # Langfuse Observability - default to local Langfuse instance
  # To use cloud: set LANGFUSE_HOST=https://us.cloud.langfuse.com in .env
  LANGFUSE_HOST: ${LANGFUSE_HOST:-http://host.docker.internal:3000}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}

services:
  # =========================================
  # INFRAESTRUTURA LOCAL (Perfil: local)
  # Só sobem se você rodar com --profile local
  # =========================================

  postgres:
    image: postgres:15-alpine
    platform: linux/amd64
    profiles: ["local"] # <--- Só sobe no modo local
    container_name: vizu_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vizu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vizu_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Serviço efêmero que roda as migrações no banco local e morre
  migrator:
    profiles: ["local"]
    build:
      context: .
      # Usa um Dockerfile simples que tem Python + Poetry
      dockerfile: ./services/migration_runner/Dockerfile
    environment:
      # Aponta para o container postgres local
      DATABASE_URL: postgresql://user:password@postgres:5432/vizu_db
    depends_on:
      postgres:
        condition: service_healthy
    # Comando mágico: usa a CLI que acabamos de criar
    command: ["poetry", "run", "vizu-db", "migrate"]
    volumes:
      - ./libs:/app/libs # Mapeia as libs para ter o código mais recente

  # =========================================
  # SERVIÇOS DA APLICAÇÃO (Perfil: padrão)
  # Rodam tanto em local quanto em prod
  # =========================================

  atendente_core:
    container_name: vizu_atendente_core
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/atendente_core/Dockerfile
    # Ensure the container loads the repo .env and uses the compose postgres
    # service as the DB host (avoid 'localhost' inside the container).
    env_file:
      - .env
    environment:
      <<: [*common-env, *atendente-env]
      PYTHONPATH: /app/services/atendente_core/src
      # Local dev uses PostgreSQL directly, not Supabase SDK
      USE_LOCAL_DB: "false"
      # MCP Tool Pool integration
      MCP_SERVER_URL: http://tool_pool_api:8000/mcp/
    ports:
      - "8003:8000"
    volumes:
      - ./services/atendente_core/src:/app/services/atendente_core/src
      - ./libs:/app/libs
      - ./seeds:/app/seeds
      - ./scripts:/app/scripts
      - ./ferramentas:/app/ferramentas
    depends_on:
      redis:
        condition: service_healthy
      tool_pool_api:
        condition: service_started
      # Em PROD, o postgres não existe, então removemos a dependência explícita
      # ou usamos required: false nas versões mais novas do Compose.
      # Para simplificar, deixamos sem depends_on do banco, a app tenta reconectar.

  # =========================================
  # INFRAESTRUTURA DE APOIO (Sempre ativa)
  # =========================================

  redis:
    container_name: vizu_redis_dev
    # Use Redis Stack which includes RedisJSON (required by the checkpoint index)
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5




  # evaluation_suite:
  #    container_name: vizu_evaluation_suite
  #    platform: linux/amd64
  #    build:
  #      context: .
  #      # Ajuste este caminho se a pasta real no seu projeto for 'ferramentas/evaluation_suite'
  #      dockerfile: ./ferramentas/evaluation_suite/Dockerfile
  #    ports:
  #      - "8501:8501"
  #    volumes:
  #      # Mapeia o código fonte para /app/src (conforme definido no Dockerfile deste serviço)
  #      - ./ferramentas/evaluation_suite/src:/app/src
  #      # Mapeia as libs compartilhadas
  #      - ./libs:/app/libs
  #    environment:
  #      <<: *common-env
  #      # URL da API que será testada (apontando para o nome do container interno)
  #      ASSISTANT_API_URL: "http://atendente_core:8000"
  #      # PYTHONPATH crítico para encontrar as libs e o próprio src da tool
  #      PYTHONPATH: "/app/src:/app/libs/vizu_db_connector/src:/app/libs/vizu_models/src"
  #    depends_on:
  #      atendente_core:
  #       condition: service_started
  #    # Note: For local development with postgres, use --profile local

  qdrant_db:
    container_name: vizu_qdrant_dev
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # CORREÇÃO: Teste de conexão TCP nativo do Bash (funciona sem curl/wget)
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    # Use the production-style collector config which forwards to Grafana Cloud
    volumes:
      - ./docker-configs/otel-collector/otel-collector-config.prod.yaml:/etc/otel-collector-config.yaml
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8888:8888" # Prometheus metrics exposed by the collector
      - "8889:8889" # Prometheus exporter metrics
      - "13133:13133" # health_check extension

  # embedding_service:
  #   container_name: vizu_embedding_service
  #   platform: linux/amd64
  #   build:
  #     context: .
  #     dockerfile: ./services/embedding_service/Dockerfile
  #   ports:
  #     - "11435:11435"
  #   volumes:
  #     # Mount host's HuggingFace cache to avoid re-downloading models
  #     # This bind mount shares your local ~/.cache/huggingface with the container
  #     - ${HOME}/.cache/huggingface:/home/appuser/.cache/huggingface
  #   environment:
  #     # Use smaller model that's likely cached locally, or set in .env
  #     # Options: sentence-transformers/all-MiniLM-L6-v2 (384 dims, fast)
  #     #          intfloat/multilingual-e5-large (1024 dims, better for PT-BR)
  #     EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-sentence-transformers/all-MiniLM-L6-v2}
  #     EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-384}
  #     EMBEDDING_MODEL_DEVICE: ${EMBEDDING_MODEL_DEVICE:-cpu}
  #   healthcheck:
  #     # Esta checagem continua a mesma...
  #     test: ["CMD-SHELL", "curl -f http://localhost:11435/health || exit 1"]
  #     interval: 30s
  #     timeout: 10s
  #     # Aumentamos as tentativas para 5
  #     retries: 5
  #     # --- ESTA É A MUDANÇA MAIS IMPORTANTE ---
  #     # Dá 5 minutos (300s) de carência para o container iniciar.
  #     # Falhas de healthcheck durante este período não contam.
  #     start_period: 300s


  file_upload_api:
    container_name: vizu_file_upload_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/file_upload_api/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./services/file_upload_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      PYTHONPATH: /app/src
      # MUDANÇA: Substituído por referência a variáveis de ambiente (ENV)
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      PUBSUB_TOPIC_ID: ${PUBSUB_TOPIC_ID}
      # FIM DA MUDANÇA
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  file_processing_worker:
    container_name: vizu_file_processing_worker
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/file_processing_worker/Dockerfile #
    ports:
      # Mapeia para a porta 8002 do host (o container expõe 8000)
      - "8002:8000"
    volumes:
      # Volume para hot-reload
      - ./services/file_processing_worker/src/file_processing_worker:/home/appuser/app/file_processing_worker
      - ./libs:/home/appuser/app/libs
    environment:
      <<: *common-env
      # Variáveis específicas do config.py

      # MUDANÇA: Substituído por referência a variáveis de ambiente (ENV)
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      PUBSUB_SUBSCRIPTION_ID: ${PUBSUB_SUBSCRIPTION_ID}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      # FIM DA MUDANÇA

      QDRANT_COLLECTION_NAME: "vizu_knowledge_base" # Ou o nome que preferir

      # Aponta para os nomes dos serviços DENTRO do Docker
      QDRANT_HOST: "qdrant_db"
      QDRANT_PORT: "6334" # Porta HTTP do Qdrant

      # Sobrescreve a URL do cliente de embedding (Passo 2)
      EMBEDDING_SERVICE_URL: "http://embedding_service:11435"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant_db: # <-- Dependência crucial
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"] #
      interval: 10s
      timeout: 5s
      retries: 5



  analytics_api:
    container_name: analytics_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/analytics_api/Dockerfile
    ports:
      - "8004:8000"
    volumes:
      - ./services/analytics_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      PYTHONPATH: /app/src
      # Analytics API uses Supabase REST API (via common-env)
      # No DATABASE_URL override needed - uses SUPABASE_URL + SUPABASE_SERVICE_KEY
    # Configure DNS servers for external connectivity (Supabase)
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    # Note: Works with Supabase (production) and local postgres (testing)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  data_ingestion_api:
    container_name: vizu_data_ingestion_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/data_ingestion_api/Dockerfile
    ports:
      - "8008:8000"
    volumes:
      - ./services/data_ingestion_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      PYTHONPATH: /app/src:/app/libs
    env_file:
      - ./services/data_ingestion_api/.env
    # Configure DNS servers for external connectivity (Supabase)
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
    # Note: postgres dependency is optional - use --profile local for local DB



  tool_pool_api:
    container_name: vizu_tool_pool_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/tool_pool_api/Dockerfile
    ports:
      - "8006:8000"
    volumes:
      - ./services/tool_pool_api/src:/app/services/tool_pool_api/src
      - ./libs:/app/libs
    environment:
      <<: [*common-env, *atendente-env]
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      # Ajustado para encontrar o código dentro da estrutura específica deste container
      PYTHONPATH: /app/services/tool_pool_api/src
      # Google OAuth config
      MCP_AUTH_GOOGLE_CLIENT_ID: ${MCP_AUTH_GOOGLE_CLIENT_ID:-}
      MCP_AUTH_GOOGLE_CLIENT_SECRET_DEV: ${MCP_AUTH_GOOGLE_CLIENT_SECRET_DEV:-}
      MCP_AUTH_BASE_URL: ${MCP_AUTH_BASE_URL:-http://localhost:8006}
      CREDENTIALS_ENCRYPTION_KEY: ${CREDENTIALS_ENCRYPTION_KEY:-}
      # Docker MCP integration
      DOCKER_MCP_ENABLED: ${DOCKER_MCP_ENABLED:-false}
      MCP_INTEGRATIONS: ${MCP_INTEGRATIONS:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy


  # =========================================
  # FRONTEND DASHBOARD (SPA React + Nginx)
  # =========================================
  vizu_dashboard:
    container_name: vizu_dashboard
    platform: linux/amd64
    build:
      context: .
      dockerfile: apps/vizu_dashboard/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8003}
        VITE_ATENDENTE_CORE: ${VITE_ATENDENTE_CORE:-http://localhost:8003}
        VITE_API_URL_ANALYTICS: ${VITE_API_URL_ANALYTICS:-http://localhost:8004}
        VITE_DATA_INGESTION_API_URL: ${VITE_DATA_INGESTION_API_URL:-http://localhost:8008}
        VITE_TOOL_POOL_API_URL: ${VITE_TOOL_POOL_API_URL:-http://localhost:8006}
    ports:
      - "8080:8080"
    environment:
      # Runtime environment (not used by Vite build, just for reference)
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8003}
  #  depends_on:
  #    - atendente_core
    restart: unless-stopped

  # =========================================
  # NEW AGENTS (Phase 4)
  # =========================================

  vendas_agent:
    container_name: vizu_vendas_agent
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/vendas_agent/Dockerfile
    env_file:
      - .env
    environment:
      <<: [*common-env, *atendente-env]
      DATABASE_URL: "postgresql://user:password@postgres:5432/vizu_db"
      PYTHONPATH: /app/src
      MCP_SERVER_URL: http://tool_pool_api:8000/mcp/
      USE_LOCAL_DB: "true"
    ports:
      - "8009:8000"
    volumes:
      - ./services/vendas_agent/src:/app/src
      - ./libs:/app/libs
    depends_on:
      redis:
        condition: service_healthy
      tool_pool_api:
        condition: service_started

  support_agent:
    container_name: vizu_support_agent
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/support_agent/Dockerfile
    env_file:
      - .env
    environment:
      <<: [*common-env, *atendente-env]
      DATABASE_URL: "postgresql://user:password@postgres:5432/vizu_db"
      PYTHONPATH: /app/src
      MCP_SERVER_URL: http://tool_pool_api:8000/mcp/
      USE_LOCAL_DB: "true"
    ports:
      - "8010:8000"
    volumes:
      - ./services/support_agent/src:/app/src
      - ./libs:/app/libs
    depends_on:
      redis:
        condition: service_healthy
      tool_pool_api:
        condition: service_started

# Definição de volumes persistentes
volumes:
  qdrant_data:
  postgres_data:
  huggingface_cache: