  analytics_api:
    container_name: analytics_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/analytics_api/Dockerfile
    ports:
      - "8004:8000"
    volumes:
      - ./services/analytics_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      PYTHONPATH: /app/src
    depends_on:
      postgres:
        condition: service_healthy
      # Dependência implícita de dados gerados por outros serviços

  data_ingestion_api:
    container_name: vizu_data_ingestion_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/data_ingestion_api/Dockerfile
    ports:
      - "8008:8000"
    volumes:
      - ./services/data_ingestion_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      PYTHONPATH: /app/src:/app/libs
    depends_on:
      postgres:
        condition: service_healthy

  clients_api:
    container_name: clients_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/clients_api/Dockerfile
    ports:
      - "8005:8000"
    volumes:
      - ./services/clients_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      # Removido /app/libs para corrigir o erro ModuleNotFoundError
      PYTHONPATH: /app/src
      CREDENTIALS_ENCRYPTION_KEY: "Y2hlY2stbXktsecrect-key-example-1234="
    depends_on:
      postgres:
        condition: service_healthy


