# Bloco principal que contém a definição de todos os serviços (contêineres).
services:
  postgres:
    image: postgres:15-alpine
    platform: linux/amd64
    container_name: vizu_postgres_dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vizu_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-manager:
    container_name: vizu_db_manager
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/db_manager/Dockerfile
    command: ["migrate"]
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/vizu_db
      # --- CORREÇÃO ADICIONAL E CRUCIAL ---
      # Garante que o Python possa encontrar as bibliotecas compartilhadas.
      - PYTHONPATH=/app/db_manager:/app/libs/vizu_db_connector/src:/app/libs/vizu_shared_models/src:/app/libs/vizu_observability_bootstrap/src
    depends_on:
      - postgres

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    container_name: vizu_redis_dev
    ports:
      - "6379:6379"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./docker-configs/otel-collector/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml
    ports:
      - "4317:4317"
      - "13133:13133"

  ollama_service:
    container_name: vizu_ollama_dev
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/ollama_service/Dockerfile
    ports:
      - "11435:11434"

  atendente_core:
    container_name: vizu_atendente_core
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/atendente_core/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - DATABASE_URL=postgresql://user:password@postgres:5432/vizu_db
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama_service:11434
      - LANGCHAIN_API_KEY=sua_chave_langchain
      - TWILIO_AUTH_TOKEN=seu_token_twilio
    depends_on:
      - postgres
      - redis
      - ollama_service
      - otel-collector
    # Volumes para desenvolvimento, permitindo hot-reload.
    volumes:
      - ./services/atendente_core/src:/app/atendente_core
      - ./libs:/app/libs

  clients_api:
    container_name: clients_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/clients_api/Dockerfile
    ports:
      - "8002:8000"
    # Volumes comentados para um build mais próximo do ambiente de produção.
    # volumes:
    #   - ./services/clients_api/src:/app/services/clients_api/src
    #   - ./libs:/app/libs
    environment:
      - PYTHONPATH=/app/src:/app/libs # <-- ATENÇÃO: Verifique se o WORKDIR no Dockerfile é /app
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - CREDENTIALS_ENCRYPTION_KEY=aemyqQi3hs1d_8-bOKnCs1nmdo5TaDEiEpcbTEiB6vE=
      - DATABASE_URL=postgresql://user:password@postgres:5432/vizu_db
    depends_on:
      - otel-collector
      - postgres

  clientes_finais_api:
    container_name: clientes_finais_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/clientes_finais_api/Dockerfile
    ports:
      - "8004:8000"
    environment:
      # PYTHONPATH alinhado com o WORKDIR /home/appuser/app do Dockerfile.
      - PYTHONPATH=/home/appuser/app:/home/appuser/app/libs
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - DATABASE_URL=postgresql://user:password@postgres:5432/vizu_db
    depends_on:
      - otel-collector
      - postgres
    profiles:
      - "clientes-finais"
      - "full"

  # --- Analytics API (O SERVIÇO QUE FALTAVA) ---
  analytics_api:
    container_name: analytics_api
    platform: linux/amd64
    # IMPORTANTE: Usamos 'image' em vez de 'build' para usar a imagem
    # que acabámos de construir com o 'tar'.
    image: vizu/analytics-api:latest
    ports:
      - "8005:80" # A API expõe 80 (do Dockerfile), mapeamos para 8005 no seu Mac
    environment:
      # A URL do banco que funciona DENTRO da rede do compose.
      - DATABASE_URL=postgresql://user:password@postgres:5432/vizu_db
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    depends_on:
      - otel-collector
      - postgres

# Bloco principal para definir volumes nomeados, que persistem dados.
volumes:
  postgres_data:
    # O driver padrão 'local' é usado se não especificado.
  # --- Ferramenta de Gerenciamento de Banco de Dados ---
  # Este serviço não é uma API, mas uma ferramenta CLI para operações de DB.
  # Ele não fica rodando; nós o executamos sob demanda com 'docker-compose run'.
