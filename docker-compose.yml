# Define a versão do compose para garantir compatibilidade

# Bloco de extensões (YAML Anchors) para definir variáveis comuns
x-common-env:
  # O &common-env define o "apelido" da âncora
  common: &common-env
    DATABASE_URL: postgresql://user:password@postgres:5432/vizu_db
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    # URL interna para comunicação entre containers
    EMBEDDING_SERVICE_URL: http://embedding_service:11435
  atendente: &atendente-env
    REDIS_URL: redis://redis:6379/0
    OLLAMA_BASE_URL: http://ollama_service:11434
    LANGCHAIN_API_KEY: sua_chave_langchain
    TWILIO_AUTH_TOKEN: seu_token_twilio

# Bloco principal que contém a definição de todos os serviços (contêineres).
services:
  postgres:
    image: postgres:15-alpine
    platform: linux/amd64
    container_name: vizu_postgres
    environment:
      # Formato CHAVE: VALOR (mapa)
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vizu_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vizu_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  db_manager:
    container_name: vizu_db_manager
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/db_manager/Dockerfile
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # --- CORREÇÃO: Caminhos Absolutos ---
      # Monta os arquivos EXATAMENTE onde o Dockerfile os colocou (WORKDIR)
      - ./services/db_manager/src/db_manager:/app/db_manager
      - ./services/db_manager/alembic:/app/alembic
      - ./services/db_manager/alembic.ini:/app/alembic.ini
      - ./libs:/app/libs

  evaluation_suite:
    container_name: vizu_evaluation_suite
    platform: linux/amd64
    build:
      context: .
      # Ajuste este caminho se a pasta real no seu projeto for 'ferramentas/evaluation_suite'
      dockerfile: ./ferramentas/evaluation_suite/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      # Mapeia o código fonte para /app/src (conforme definido no Dockerfile deste serviço)
      - ./evaluation_suite/src:/app/src
      # Mapeia as libs compartilhadas
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # URL da API que será testada (apontando para o nome do container interno)
      ASSISTANT_API_URL: "http://atendente_core:8000"
      # PYTHONPATH crítico para encontrar as libs e o próprio src da tool
      PYTHONPATH: "/app/src:/app/libs/vizu_db_connector/src:/app/libs/vizu_shared_models/src"
    depends_on:
      postgres:
        condition: service_healthy
      atendente_core: # Garante que a API alvo já iniciou antes de rodar os testes
        condition: service_started

  clientes_finais_api:
    container_name: vizu_clientes_finais_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/clientes_finais_api/Dockerfile
    ports:
      # Usei a porta 8007 para evitar conflito com a clients_api (8005) e tool_pool (8006)
      - "8007:8000"
    volumes:
      # Mapeamento ajustado para a estrutura do novo Dockerfile (usuário 'appuser')
      # Monta o código fonte diretamente onde o Dockerfile o copiou
      - ./services/clientes_finais_api/src/clientes_finais_api:/home/appuser/app/clientes_finais_api
      # Monta as bibliotecas compartilhadas
      - ./libs:/home/appuser/app/libs
    environment:
      <<: *common-env
      # Garante que o PYTHONPATH inclua tanto a app quanto as libs, conforme definido no Dockerfile
      PYTHONPATH: "/home/appuser/app"
    depends_on:
      postgres:
        condition: service_healthy

  ollama_service:
    container_name: vizu_ollama_dev
    # Usa a imagem oficial como base (ou a sua customizada se preferir buildar sempre)
    # Se quiser usar o Dockerfile customizado (recomendado para o Modelfile):
    build:
      context: .
      dockerfile: ./services/ollama_service/Dockerfile
    ports:
      # --- CORREÇÃO DE PORTA ---
      # Volta para a porta padrão para não conflitar com o embedding (11435)
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: 1
#              capabilities: [gpu]

  qdrant_db:
    container_name: vizu_qdrant_dev
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # CORREÇÃO: Teste de conexão TCP nativo do Bash (funciona sem curl/wget)
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    container_name: vizu_redis_dev
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker-configs/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8888:8888" # Prometheus metrics exposed by the collector
      - "8889:8889" # Prometheus exporter metrics
      - "13133:13133" # health_check extension

  embedding_service:
    container_name: vizu_embedding_service
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/embedding_service/Dockerfile
    ports:
      - "11435:11435"
    volumes:
      - ./services/embedding_service/src/embedding_service:/app/services/embedding_service
      - ./libs:/app/libs
    environment:
      <<: *common-env
      EMBEDDING_MODEL_DEVICE: "cpu"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; import sys; print(urllib.request.urlopen('http://localhost:11435/health').getcode())"]
      interval: 10s
      timeout: 5s
      retries: 5

  file_upload_api:
    container_name: vizu_file_upload_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/file_upload_api/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./services/file_upload_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      PYTHONPATH: /app/src
      GCP_PROJECT_ID: "seu-projeto-gcp"
      GCS_BUCKET_NAME: "seu-bucket-gcs"
      PUBSUB_TOPIC_ID: "seu-topico-pubsub"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  file_processing_worker:
    container_name: vizu_file_processing_worker
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/file_processing_worker/Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./services/file_processing_worker/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      PYTHONPATH: /app/src
      GCP_PROJECT_ID: "seu-projeto-gcp"
      PUBSUB_SUBSCRIPTION_ID: "sua-subscription-id-pubsub"
      GCS_BUCKET_NAME: "seu-bucket-gcs"
      QDRANT_COLLECTION_NAME: "vizu_knowledge_base"
      QDRANT_HOST: "qdrant_db"
      QDRANT_PORT: "6333" # Porta GRPC ou HTTP (confirme se sua lib usa 6333 ou 6334)
    depends_on:
      postgres:
        condition: service_healthy
      qdrant_db:
        condition: service_healthy
      embedding_service:
        condition: service_healthy

  atendente_core:
    container_name: vizu_atendente_core
    platform: linux/amd64
    build:
      context: .
      # Garante que está apontando para a pasta correta
      dockerfile: ./services/atendente_core/Dockerfile
    environment:
      <<: [*common-env, *atendente-env]
      # Aponta para o src dentro da pasta do serviço
      PYTHONPATH: /app/services/atendente_core/src
    ports:
      - "8003:8000"
    volumes:
      # --- CORREÇÃO: Caminhos Absolutos ---
      - ./services/atendente_core/src:/app/services/atendente_core/src
      - ./libs:/app/libs
    depends_on:
      redis:
        condition: service_healthy
      ollama_service:
        condition: service_started

  analytics_api:
    container_name: analytics_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/analytics_api/Dockerfile
    ports:
      - "8004:8000"
    volumes:
      - ./services/analytics_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      PYTHONPATH: /app/src
    depends_on:
      postgres:
        condition: service_healthy
      # Dependência implícita de dados gerados por outros serviços

  clients_api:
    container_name: clients_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/clients_api/Dockerfile
    ports:
      - "8005:8000"
    volumes:
      - ./services/clients_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      # Removido /app/libs para corrigir o erro ModuleNotFoundError
      PYTHONPATH: /app/src
      CREDENTIALS_ENCRYPTION_KEY: "Y2hlY2stbXktc2VjcmV0LWtleS1leGFtcGxlLTEyMzQ="
    depends_on:
      postgres:
        condition: service_healthy
      atendente_core:
        condition: service_started

  tool_pool_api:
    container_name: vizu_tool_pool_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/tool_pool_api/Dockerfile
    ports:
      - "8006:8000"
    volumes:
      - ./services/tool_pool_api/src:/app/services/tool_pool_api/src
      - ./libs:/app/libs
    environment:
      <<: [*common-env, *atendente-env]
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      # Ajustado para encontrar o código dentro da estrutura específica deste container
      PYTHONPATH: /app/services/tool_pool_api/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama_service:
        condition: service_started

# Definição de volumes persistentes
volumes:
  postgres_data:
  qdrant_data:
  ollama_storage: