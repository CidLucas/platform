# --- DEFINIÇÕES COMUNS ---
x-common-env: &common-env
  # Variáveis Padronizadas Supabase (Primary Data Store)
  SUPABASE_URL: ${SUPABASE_URL}
  SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
  SUPABASE_JWT_SECRET: ${SUPABASE_JWT_SECRET}
  SUPABASE_JWT_JWK: ${SUPABASE_JWT_JWK}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-ES256}
  # Legacy PostgreSQL (deprecated - use Supabase REST API instead)
  # Only kept for backward compatibility with tests
  DATABASE_URL: ${DATABASE_URL:-}
  DB_MODE: ${DB_MODE:-supabase}
  # OpenTelemetry — Grafana Cloud direct export (HTTPS) or local otel-collector (gRPC)
  # When OTEL_EXPORTER_OTLP_ENDPOINT points to Grafana Cloud (https://...grafana.net/otlp),
  # services export directly; no local otel-collector needed.
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
  OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
  OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-otlp}
  OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
  OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-otlp}
  EMBEDDING_SERVICE_URL: http://embedding_service:11435
  # Qdrant removed — vector storage migrated to Supabase vector_db schema
  # See docs/RAG_MIGRATION_GUIDE.md
  # Internal API base (atendente_core is the main entry point)
  BASE_URL: "http://atendente_core:8000"

x-atendente-env: &atendente-env
  REDIS_URL: redis://redis:6379/0
  LANGCHAIN_API_KEY: ${LANGCHAIN_API_KEY}
  TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
  # LLM Provider - ollama_cloud, openai, anthropic, google
  LLM_PROVIDER: ${LLM_PROVIDER:-ollama_cloud}
  # Ollama Cloud
  OLLAMA_CLOUD_API_KEY: ${OLLAMA_CLOUD_API_KEY}
  OLLAMA_CLOUD_BASE_URL: ${OLLAMA_CLOUD_BASE_URL:-https://ollama.com}
  # Commercial LLM APIs (optional)
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
  # Langfuse Observability - default to local Langfuse instance
  LANGFUSE_HOST: ${LANGFUSE_HOST:-http://langfuse:3000}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}

services:
  # =========================================
  # INFRAESTRUTURA LOCAL (Perfil: local)
  # Só sobem se você rodar com --profile local
  # =========================================

  postgres:
    image: postgres:15-alpine
    platform: linux/amd64
    profiles: ["local"] # <--- Só sobe no modo local
    container_name: vizu_postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vizu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d vizu_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Serviço efêmero que roda as migrações no banco local e morre
  migrator:
    profiles: ["local"]
    build:
      context: .
      # Usa um Dockerfile simples que tem Python + Poetry
      dockerfile: ./services/migration_runner/Dockerfile
    environment:
      # Aponta para o container postgres local
      DATABASE_URL: postgresql://user:password@postgres:5432/vizu_db
    depends_on:
      postgres:
        condition: service_healthy
    # Comando mágico: usa a CLI que acabamos de criar
    command: ["poetry", "run", "vizu-db", "migrate"]
    volumes:
      - ./libs:/app/libs # Mapeia as libs para ter o código mais recente

  # =========================================
  # SERVIÇOS DA APLICAÇÃO (Perfil: padrão)
  # Rodam tanto em local quanto em prod
  # =========================================

  atendente_core:
    container_name: vizu_atendente_core
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/atendente_core/Dockerfile
    # Ensure the container loads the repo .env and uses the compose postgres
    # service as the DB host (avoid 'localhost' inside the container).
    env_file:
      - .env
    environment:
      <<: [*common-env, *atendente-env]
      PYTHONPATH: /app/services/atendente_core/src
      # Local dev uses PostgreSQL directly, not Supabase SDK
      USE_LOCAL_DB: "false"
      # MCP Tool Pool integration
      MCP_SERVER_URL: http://tool_pool_api:8000/mcp/
    ports:
      - "8003:8000"
    volumes:
      - ./services/atendente_core/src:/app/services/atendente_core/src
      - ./libs:/app/libs
      - ./seeds:/app/seeds
      - ./scripts:/app/scripts
      - ./ferramentas:/app/ferramentas
    depends_on:
      redis:
        condition: service_healthy
      tool_pool_api:
        condition: service_started
      # Em PROD, o postgres não existe, então removemos a dependência explícita
      # ou usamos required: false nas versões mais novas do Compose.
      # Para simplificar, deixamos sem depends_on do banco, a app tenta reconectar.

  # =========================================
  # INFRAESTRUTURA DE APOIO (Sempre ativa)
  # =========================================

  redis:
    container_name: vizu_redis_dev
    # Use Redis Stack which includes RedisJSON (required by the checkpoint index)
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5




  # evaluation_suite:
  #    container_name: vizu_evaluation_suite
  #    platform: linux/amd64
  #    build:
  #      context: .
  #      # Ajuste este caminho se a pasta real no seu projeto for 'ferramentas/evaluation_suite'
  #      dockerfile: ./ferramentas/evaluation_suite/Dockerfile
  #    ports:
  #      - "8501:8501"
  #    volumes:
  #      # Mapeia o código fonte para /app/src (conforme definido no Dockerfile deste serviço)
  #      - ./ferramentas/evaluation_suite/src:/app/src
  #      # Mapeia as libs compartilhadas
  #      - ./libs:/app/libs
  #    environment:
  #      <<: *common-env
  #      # URL da API que será testada (apontando para o nome do container interno)
  #      ASSISTANT_API_URL: "http://atendente_core:8000"
  #      # PYTHONPATH crítico para encontrar as libs e o próprio src da tool
  #      PYTHONPATH: "/app/src:/app/libs/vizu_db_connector/src:/app/libs/vizu_models/src"
  #    depends_on:
  #      atendente_core:
  #       condition: service_started
  #    # Note: For local development with postgres, use --profile local

  # qdrant_db: DEPRECATED — migrated to Supabase vector_db schema.
  # See docs/RAG_MIGRATION_GUIDE.md


  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: otel-collector
    profiles: ["observability"]  # Only start with Langfuse stack
    command: ["--config=/etc/otel-collector-config.yaml"]
    # Dev: Langfuse config | Prod: use docker-compose.prod.yml override
    volumes:
      - ./docker-configs/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LANGFUSE_OTEL_AUTH: ${LANGFUSE_OTEL_AUTH:-}
      # Grafana Cloud (used in prod override)
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
    depends_on:
      langfuse:
        condition: service_healthy
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8888:8888" # Prometheus metrics exposed by the collector
      - "8889:8889" # Prometheus exporter metrics
      - "13133:13133" # health_check extension

  # =========================================
  # LANGFUSE v3 (LLM Observability with ClickHouse)
  # Self-hosted for dev prompt testing & tracing
  # =========================================

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server:24.3
    container_name: langfuse_clickhouse
    profiles: ["observability"]
    environment:
      CLICKHOUSE_DB: langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse_ch_secret
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
    ports:
      - "8123:8123"  # HTTP interface
      - "9000:9000"  # Native protocol
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse_redis
    profiles: ["observability"]
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - langfuse_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-minio:
    image: minio/minio:latest
    container_name: langfuse_minio
    profiles: ["observability"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: langfuse_minio_secret
    volumes:
      - langfuse_minio_data:/data
    ports:
      - "9002:9000"   # S3 API
      - "9001:9001"   # Console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse-db:
    image: postgres:15-alpine
    container_name: langfuse_postgres
    profiles: ["observability"]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:3
    container_name: langfuse
    profiles: ["observability"]
    depends_on:
      langfuse-db:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-minio:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      # PostgreSQL
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse

      # ClickHouse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse_ch_secret@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse_ch_secret
      CLICKHOUSE_CLUSTER_ENABLED: "false"

      # Redis
      REDIS_CONNECTION_STRING: redis://langfuse-redis:6379

      # S3/MinIO for blob storage
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse_minio_secret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      # Auth
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-mysecretkey-change-in-production}
      SALT: ${LANGFUSE_SALT:-mysalt-change-in-production}

      # Logging - enable debug for OTEL troubleshooting
      LANGFUSE_LOG_LEVEL: debug

      # Features
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://$(hostname -i):3000/api/public/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: langfuse_worker
    profiles: ["observability"]
    depends_on:
      langfuse:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse:langfuse_ch_secret@langfuse-clickhouse:9000/langfuse
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: langfuse_ch_secret
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_CONNECTION_STRING: redis://langfuse-redis:6379
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse-events
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: langfuse_minio_secret
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_LOG_LEVEL: debug

