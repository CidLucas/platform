#         condition: service_started

  clientes_finais_api:
    container_name: vizu_clientes_finais_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/clientes_finais_api/Dockerfile
    ports:
      # Usei a porta 8007 para evitar conflito com a clients_api (8005) e tool_pool (8006)
      - "8007:8000"
    volumes:
      # Mapeamento ajustado para a estrutura do novo Dockerfile (usuário 'appuser')
      # Monta o código fonte diretamente onde o Dockerfile o copiou
      - ./services/clientes_finais_api/src/clientes_finais_api:/home/appuser/app/clientes_finais_api
      # Monta as bibliotecas compartilhadas
      - ./libs:/home/appuser/app/libs
    environment:
      <<: *common-env
      # Garante que o PYTHONPATH inclua tanto a app quanto as libs, conforme definido no Dockerfile
      PYTHONPATH: "/home/appuser/app"
    depends_on:
      postgres:
        condition: service_healthy

  ollama_service:
    container_name: vizu_ollama_dev
    # Usa a imagem oficial como base (ou a sua customizada se preferir buildar sempre)
    # Se quiser usar o Dockerfile customizado (recomendado para o Modelfile):
    build:
      context: .
      dockerfile: ./services/ollama_service/Dockerfile
    ports:
      # --- CORREÇÃO DE PORTA ---
      # Volta para a porta padrão para não conflitar com o embedding (11435)
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: 1
#              capabilities: [gpu]

  qdrant_db:
    container_name: vizu_qdrant_dev
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      # CORREÇÃO: Teste de conexão TCP nativo do Bash (funciona sem curl/wget)
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    container_name: vizu_redis_dev
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./docker-configs/otel-collector/otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317" # OTLP gRPC receiver
      - "4318:4318" # OTLP HTTP receiver
      - "8888:8888" # Prometheus metrics exposed by the collector
      - "8889:8889" # Prometheus exporter metrics
      - "13133:13133" # health_check extension

  embedding_service:
    container_name: vizu_embedding_service
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/embedding_service/Dockerfile
    ports:
      - "11435:11435"
    volumes:
      - ollama_storage:/root/.ollama
    healthcheck:
      # Esta checagem continua a mesma...
      test: ["CMD-SHELL", "curl -f http://localhost:11435/health || exit 1"]
      interval: 30s
      timeout: 10s
      # Aumentamos as tentativas para 5
      retries: 5
      # --- ESTA É A MUDANÇA MAIS IMPORTANTE ---
      # Dá 5 minutos (300s) de carência para o container iniciar.
      # Falhas de healthcheck durante este período não contam.
      start_period: 300s


  file_upload_api:
    container_name: vizu_file_upload_api
    platform: linux/amd64
    build:
      context: .
      dockerfile: ./services/file_upload_api/Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./services/file_upload_api/src:/app/src
      - ./libs:/app/libs
    environment:
      <<: *common-env
      # --- CORREÇÃO DE IMPORTAÇÃO ---
      PYTHONPATH: /app/src
      GCP_PROJECT_ID: "seu-projeto-gcp"
      GCS_BUCKET_NAME: "seu-bucket-gcs"
      PUBSUB_TOPIC_ID: "seu-topico-pubsub"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

