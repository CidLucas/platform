[tool.poetry]
name = "vizu-llm-service"
version = "0.1.0"
description = "Biblioteca centralizada da Vizu para roteamento e instanciação de modelos de linguagem (LLMs)."
authors = ["Lucas Cid <lucas@vizubr.com>"]
readme = "README.md"
packages = [{include = "vizu_llm_service", from = "src"}]

[tool.poetry.dependencies]
python = "^3.11"
pydantic-settings = "^2.3.4"
# ATUALIZAÇÃO: Alinhando com as novas versões do ecossistema LangChain
langchain-community = "^0.3.0"
langchain-openai = "^0.2.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.2.2"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"